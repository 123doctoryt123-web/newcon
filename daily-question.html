<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سؤال اليوم ❓ | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── loading ── */
#loadingState{
  display:flex; flex-direction:column; align-items:center;
  gap:12px; padding:60px 0; color:var(--mist-dim); font-size:14px;
}
.spinner{
  width:32px; height:32px; border:3px solid var(--line);
  border-top-color:var(--gold); border-radius:50%;
  animation: spin .7s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ── كارت السؤال ── */
.q-card{
  background: linear-gradient(160deg, var(--ink-2), var(--ink-3));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: var(--shadow-glow);
}
.q-header{
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 12px;
}
.q-icon-box{
  width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--gold), var(--coral));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 18px rgba(200,150,90,0.35);
}
.q-meta{ flex:1; }
.q-label{ font-size:12px; color:var(--mist-dim); margin-bottom:3px; }
.q-pts{
  display:inline-flex; align-items:center; gap:5px;
  background: rgba(200,150,90,0.12); border:1px solid rgba(200,150,90,0.25);
  border-radius:99px; padding:3px 10px;
  font-family:var(--font-display); font-weight:800; font-size:13px; color:var(--gold);
}

.q-body{ padding: 20px; }
.q-text{
  font-family: var(--font-display);
  font-size: 19px; font-weight: 800;
  color: var(--mist);
  line-height: 1.5;
  margin-bottom: 22px;
}

/* ── أزرار الخيارات ── */
.option-btn{
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(200,150,90,0.18);
  border-radius: 13px;
  padding: 14px 16px;
  margin-bottom: 10px;
  color: var(--mist);
  font-family: var(--font-body);
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  text-align: right;
  transition: all .2s;
  display: flex; align-items: center; gap: 12px;
}
.option-btn:hover:not(:disabled){
  background: rgba(200,150,90,0.12);
  border-color: var(--gold);
  transform: translateY(-1px);
}
.option-btn:disabled{ cursor: default; }

/* حالات ما بعد الإجابة */
.option-btn.correct{
  background: rgba(74,124,111,0.18);
  border-color: var(--pitch);
  color: #a9e6c4;
}
.option-btn.wrong{
  background: rgba(192,83,58,0.15);
  border-color: var(--coral);
  color: #ffb3a6;
}
.option-btn.reveal-correct{
  background: rgba(74,124,111,0.12);
  border-color: var(--pitch);
  color: #a9e6c4;
}

.opt-letter{
  width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
  background: rgba(200,150,90,0.15);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800;
  font-size: 13px; color: var(--gold);
}
.option-btn.correct .opt-letter{ background: rgba(74,124,111,0.3); color:#a9e6c4; }
.option-btn.wrong .opt-letter{ background: rgba(192,83,58,0.3); color:#ffb3a6; }
.option-btn.reveal-correct .opt-letter{ background: rgba(74,124,111,0.2); color:#a9e6c4; }

/* ── نتيجة ── */
.result-banner{
  border-radius: var(--radius);
  padding: 24px 18px;
  text-align: center;
  margin-bottom: 16px;
}
.result-banner.correct-res{
  background: linear-gradient(135deg, rgba(74,124,111,0.2), rgba(74,124,111,0.06));
  border: 1px solid var(--pitch);
}
.result-banner.wrong-res{
  background: linear-gradient(135deg, rgba(192,83,58,0.18), rgba(192,83,58,0.04));
  border: 1px solid var(--coral);
}
.result-icon{ font-size:54px; margin-bottom:10px; display:block; }
.result-title{
  font-family:var(--font-display); font-weight:800; font-size:20px;
  margin-bottom:6px;
}
.result-banner.correct-res .result-title{ color: #a9e6c4; }
.result-banner.wrong-res .result-title{ color: #ffb3a6; }
.result-sub{ font-size:13px; color:var(--mist-dim); }

.pts-pill{
  display:inline-block; margin-top:12px;
  background: rgba(200,150,90,0.15); border:1px solid var(--gold);
  border-radius:99px; padding:6px 18px;
  font-family:var(--font-display); font-weight:800;
  color:var(--gold); font-size:15px;
}

/* ── فارغ / مقفول ── */
.empty-state{
  text-align:center; padding:60px 20px;
  color:var(--mist-dim);
}
.empty-state .big-emoji{ font-size:52px; margin-bottom:14px; display:block; }
.empty-state h2{
  font-family:var(--font-display); font-weight:800;
  font-size:18px; color:var(--mist); margin-bottom:8px;
}
.empty-state p{ font-size:13px; line-height:1.7; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="dashboard.html" class="brand"><span class="dot"></span> Connect Three</a>
    <a href="dashboard.html" class="logout-link">رجوع</a>
  </div>

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:22px">
    <span style="font-size:30px">❓</span>
    <div>
      <h1 class="display" style="font-size:20px">سؤال اليوم</h1>
      <p style="font-size:12px;color:var(--mist-dim);margin:0">جاوب صح واكسب البوينتس!</p>
    </div>
  </div>

  <!-- loading -->
  <div id="loadingState">
    <div class="spinner"></div>
    <span>جاري التحميل…</span>
  </div>

  <!-- محتوى ديناميكي -->
  <div id="mainContent" style="display:none"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
var member = requireSession();
if(member){
  document.querySelector('.logout-link') && (document.querySelector('a[href="dashboard.html"].logout-link'));
}

var currentQ = null;  // بيانات السؤال النشط

// ============================================================
// تحميل السؤال
// ============================================================
async function loadQuestion(){
  showLoading(true);
  var res = await supabase.rpc('get_active_daily_question', { p_member_id: member.id });
  showLoading(false);

  if(res.error){ showEmpty('حصل خطأ في التحميل 😕', false); return; }
  if(!res.data || res.data.length === 0){ showEmpty(); return; }

  currentQ = res.data[0];

  if(currentQ.my_answer !== null){
    // جاوب قبل كده
    renderAnswered();
  } else {
    renderQuestion();
  }
}

// ============================================================
// رسم السؤال (لسه ماجاوبش)
// ============================================================
function renderQuestion(){
  var letters = ['أ','ب','ج','د'];
  var keys    = ['option_a','option_b','option_c','option_d'];
  var vals    = ['a','b','c','d'];

  var opts = keys.map(function(k, i){
    return '<button class="option-btn" id="opt_'+vals[i]+'" onclick="answer(\''+vals[i]+'\')">'
      + '<span class="opt-letter">'+letters[i]+'</span>'
      + escHtml(currentQ[k])
      + '</button>';
  }).join('');

  var html =
    '<div class="q-card">'
    + '<div class="q-header">'
    +   '<div class="q-icon-box">❓</div>'
    +   '<div class="q-meta">'
    +     '<div class="q-label">سؤال اليوم</div>'
    +     '<div class="q-pts">✨ '+currentQ.points+' بوينتس للإجابة الصح</div>'
    +   '</div>'
    + '</div>'
    + '<div class="q-body">'
    +   '<div class="q-text">'+escHtml(currentQ.question)+'</div>'
    +   opts
    + '</div>'
    + '</div>';

  show(html);
}

// ============================================================
// إجابة
// ============================================================
async function answer(chosen){
  if(!currentQ) return;

  // قفل الأزرار
  ['a','b','c','d'].forEach(function(v){
    var b = document.getElementById('opt_'+v);
    if(b) b.disabled = true;
  });

  var res = await supabase.rpc('answer_daily_question', {
    p_member_id:   member.id,
    p_question_id: currentQ.question_id,
    p_chosen_opt:  chosen
  });

  if(res.error || res.data === 'closed'){
    await loadQuestion(); return;
  }
  if(res.data === 'already_answered'){
    await loadQuestion(); return;
  }

  var isCorrect = (res.data === 'correct');
  currentQ.my_answer  = chosen;
  currentQ.is_correct = isCorrect;

  // لوّن الخيارات
  ['a','b','c','d'].forEach(function(v){
    var b = document.getElementById('opt_'+v);
    if(!b) return;
    if(v === currentQ.correct_opt && v === chosen){ b.classList.add('correct'); }
    else if(v === chosen && !isCorrect)           { b.classList.add('wrong'); }
    else if(v === currentQ.correct_opt)           { b.classList.add('reveal-correct'); }
  });

  // أضف بانر النتيجة فوق الكارت
  var mainDiv = document.getElementById('mainContent');
  var banner  = document.createElement('div');
  banner.className = 'result-banner ' + (isCorrect ? 'correct-res' : 'wrong-res');

  if(isCorrect){
    banner.innerHTML =
      '<span class="result-icon">🎉</span>'
      + '<div class="result-title">إجابة صح!</div>'
      + '<div class="result-sub">أنت من الشباب اللي بيفكر 💡</div>'
      + '<div class="pts-pill">+'+currentQ.points+' بوينتس ✨</div>';
  } else {
    var correctLetters = {'a':'أ','b':'ب','c':'ج','d':'د'};
    var correctKey     = 'option_' + currentQ.correct_opt;
    banner.innerHTML =
      '<span class="result-icon">😅</span>'
      + '<div class="result-title">إجابة غلط</div>'
      + '<div class="result-sub">الإجابة الصح كانت: <strong style="color:var(--mist)">'
      + correctLetters[currentQ.correct_opt] + ' — ' + escHtml(currentQ[correctKey]) + '</strong></div>';
  }

  mainDiv.insertBefore(banner, mainDiv.firstChild);
}

// ============================================================
// رسم "جاوبت قبل كده"
// ============================================================
function renderAnswered(){
  var isCorrect   = currentQ.is_correct;
  var letters     = ['أ','ب','ج','د'];
  var keys        = ['option_a','option_b','option_c','option_d'];
  var vals        = ['a','b','c','d'];
  var correctLetters = {'a':'أ','b':'ب','c':'ج','d':'د'};
  var correctKey     = 'option_' + currentQ.correct_opt;

  // بانر
  var banner = isCorrect
    ? '<div class="result-banner correct-res">'
      + '<span class="result-icon">🎉</span>'
      + '<div class="result-title">أجبت صح! ✅</div>'
      + '<div class="result-sub">عملت كويس جداً 💡</div>'
      + '<div class="pts-pill">+'+currentQ.points+' بوينتس ✨</div>'
      + '</div>'
    : '<div class="result-banner wrong-res">'
      + '<span class="result-icon">😅</span>'
      + '<div class="result-title">إجابتك كانت غلط</div>'
      + '<div class="result-sub">الإجابة الصح: <strong style="color:var(--mist)">'
      + correctLetters[currentQ.correct_opt] + ' — ' + escHtml(currentQ[correctKey]) + '</strong></div>'
      + '</div>';

  // الكارت بالخيارات الملوّنة
  var opts = keys.map(function(k, i){
    var v   = vals[i];
    var cls = 'option-btn';
    if(v === currentQ.correct_opt && v === currentQ.my_answer) cls += ' correct';
    else if(v === currentQ.my_answer)                          cls += ' wrong';
    else if(v === currentQ.correct_opt)                        cls += ' reveal-correct';
    return '<button class="'+cls+'" disabled>'
      + '<span class="opt-letter">'+letters[i]+'</span>'
      + escHtml(currentQ[k])
      + '</button>';
  }).join('');

  var card =
    '<div class="q-card">'
    + '<div class="q-header">'
    +   '<div class="q-icon-box">❓</div>'
    +   '<div class="q-meta">'
    +     '<div class="q-label">سؤال اليوم</div>'
    +     '<div class="q-pts">✨ '+currentQ.points+' بوينتس</div>'
    +   '</div>'
    + '</div>'
    + '<div class="q-body">'
    +   '<div class="q-text">'+escHtml(currentQ.question)+'</div>'
    +   opts
    + '</div>'
    + '</div>';

  show(banner + card);
}

// ============================================================
// فارغ
// ============================================================
function showEmpty(msg, noQuestion){
  if(noQuestion === undefined) noQuestion = true;
  var html = noQuestion
    ? '<div class="empty-state">'
      + '<span class="big-emoji">⏳</span>'
      + '<h2>مفيش سؤال نشط دلوقتي</h2>'
      + '<p>استنى الأدمن يحط سؤال اليوم<br>ورجّع تاني 😄</p>'
      + '</div>'
    : '<div class="empty-state">'
      + '<span class="big-emoji">😕</span>'
      + '<h2>حصل خطأ</h2>'
      + '<p>'+escHtml(msg)+'</p>'
      + '</div>';
  show(html);
}

// ============================================================
// Realtime — لو الأدمن نزّل سؤال جديد أو وقّف القديم
// ============================================================
supabase.channel('rt-daily-question')
  .on('postgres_changes', {
    event: '*', schema: 'public', table: 'daily_questions'
  }, function(){ loadQuestion(); })
  .subscribe();

// ============================================================
// Helpers
// ============================================================
function showLoading(v){
  document.getElementById('loadingState').style.display  = v ? 'flex' : 'none';
  document.getElementById('mainContent').style.display   = v ? 'none' : 'block';
}
function show(html){
  document.getElementById('mainContent').innerHTML = html;
  document.getElementById('mainContent').style.display = 'block';
  document.getElementById('loadingState').style.display = 'none';
}
function escHtml(s){
  return (s||'').toString().replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

// ============================================================
// Init
// ============================================================
loadQuestion();
</script>
</body>
</html>
