<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامج المؤتمر | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<style>
.day-tabs{
  display:flex; gap:8px; margin-bottom:20px;
}
.day-tab{
  flex:1; text-align:center; padding:10px; border-radius:var(--radius-sm);
  border:1px solid var(--line); cursor:pointer; color:var(--mist-dim);
  font-family:var(--font-display); font-size:13px; font-weight:600;
  transition: all .15s;
}
.day-tab.active{
  background: linear-gradient(135deg, var(--coral), #a03020);
  color:#fff; border-color:var(--coral);
}
.program-item{
  display:flex; gap:16px; align-items:flex-start;
  padding:14px 0; border-bottom:1px solid var(--line);
}
.program-item:last-child{ border-bottom:none; }
.program-time{
  font-family:var(--font-display); font-size:13px;
  color:var(--gold); font-weight:700; min-width:60px; text-align:center;
  background: rgba(200,150,90,0.1); padding:4px 8px; border-radius:8px;
  white-space:nowrap;
}
.program-title{ font-size:15px; font-weight:600; padding-top:2px; }
</style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <a href="dashboard.html" class="brand">
      <img src="logo.png" style="width:28px;height:28px;object-fit:contain;">
      Connect Three
    </a>
    <a href="#" class="logout-link" id="logoutBtn">خروج</a>
  </div>

  <h1 class="display" style="font-size:20px;margin-bottom:6px">📅 برنامج المؤتمر</h1>
  <p style="color:var(--mist-dim);font-size:13px;margin-bottom:18px">19 - 20 - 21 يوليو</p>

  <div class="day-tabs">
    <div class="day-tab active" data-day="1" onclick="switchDay(1)">اليوم ١<br><small style="font-weight:400;font-size:11px">19 يوليو</small></div>
    <div class="day-tab" data-day="2" onclick="switchDay(2)">اليوم ٢<br><small style="font-weight:400;font-size:11px">20 يوليو</small></div>
    <div class="day-tab" data-day="3" onclick="switchDay(3)">اليوم ٣<br><small style="font-weight:400;font-size:11px">21 يوليو</small></div>
  </div>

  <div class="card" id="programCard">
    <div class="empty-state">بنحمّل البرنامج...</div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
var member = requireSession();
document.getElementById("logoutBtn").addEventListener("click", logout);

var allItems = [];
var currentDay = 1;

async function loadProgram(){
  var res = await supabase.from("program_items").select("*").order("day").order("sort_order").order("time_label");
  allItems = res.data || [];
  renderDay(currentDay);
}

function switchDay(day){
  currentDay = day;
  document.querySelectorAll(".day-tab").forEach(function(t){
    t.classList.toggle("active", parseInt(t.dataset.day) === day);
  });
  renderDay(day);
}

function renderDay(day){
  var items = allItems.filter(function(i){ return i.day === day; });
  var card = document.getElementById("programCard");
  if(items.length === 0){
    card.innerHTML = '<div class="empty-state"><div style="font-size:36px;margin-bottom:8px">📭</div><div>مفيش برنامج لسه لليوم ده</div></div>';
    return;
  }
  card.innerHTML = items.map(function(item){
    return '<div class="program-item"><div class="program-time">' + item.time_label + '</div><div class="program-title">' + item.title + '</div></div>';
  }).join("");
}

loadProgram();
</script>
</body>
</html>
