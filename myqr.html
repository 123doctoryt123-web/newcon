<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR بتاعي | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/qrcode.min.js"></script>
<style>
.qr-box{
  text-align:center; padding:30px 20px;
}
.qr-canvas-wrap{
  display:inline-block;
  background:#fff; border-radius:16px;
  padding:16px; box-shadow:0 0 40px rgba(200,150,90,0.25);
  margin-bottom:18px;
}
.qr-name{
  font-family:var(--font-display); font-size:22px; font-weight:800;
  color:var(--mist); margin-bottom:6px;
}
.qr-id{ font-size:11px; color:var(--mist-dim); letter-spacing:1px; margin-bottom:20px; }
.qr-hint{ font-size:13px; color:var(--mist-dim); line-height:1.8; }
</style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <a href="dashboard.html" class="brand">
      <img src="logo.png" style="width:28px;height:28px;object-fit:contain;">
      Connect Three
    </a>
    <a href="#" class="logout-link" id="logoutBtn">خروج</a>
  </div>

  <h1 class="display" style="font-size:20px;margin-bottom:6px">📲 QR بتاعي</h1>
  <p style="color:var(--mist-dim);font-size:13px;margin-bottom:20px">
    وريه للـ Leader يعمله سكان عشان يتسجّل حضورك
  </p>

  <div class="card glow">
    <div class="qr-box">
      <div class="qr-canvas-wrap">
        <canvas id="qrCanvas"></canvas>
      </div>
      <div class="qr-name" id="memberNameEl"></div>
      <div class="qr-id" id="memberIdEl"></div>
      <div class="qr-hint">
        اعرض الـ QR لقائد فريقك<br>
        📖 درس الكتاب · 🗂️ المشروع
      </div>
    </div>
  </div>

  <button class="btn outline" id="saveImgBtn" style="margin-top:8px">💾 حفظ الـ QR كصورة</button>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
var member = requireSession();
document.getElementById("logoutBtn").addEventListener("click", logout);

if (member) {
  document.getElementById("memberNameEl").textContent = member.name;
  document.getElementById("memberIdEl").textContent = member.id;

  QRCode.toCanvas(
    document.getElementById("qrCanvas"),
    member.id,
    {
      width: 220,
      margin: 1,
      color: { dark: "#0D1B2A", light: "#FFFFFF" },
    },
    function (err) {
      if (err) console.error(err);
    }
  );

  document.getElementById("saveImgBtn").addEventListener("click", function () {
    var canvas = document.getElementById("qrCanvas");
    var link = document.createElement("a");
    link.download = "qr-" + member.username + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}
</script>
</body>
</html>
