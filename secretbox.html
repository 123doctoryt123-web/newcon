<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صندوق الأسرار | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ═══ Hero ═══ */
.page-hero{
  position:relative; overflow:hidden;
  padding:32px 20px 28px;
  text-align:center;
  background:linear-gradient(160deg,rgba(200,150,90,.08),transparent 60%);
  border-bottom:1px solid var(--line);
  margin-bottom:20px;
}
.page-hero-glow{
  position:absolute; top:-40px; left:50%; transform:translateX(-50%);
  width:280px; height:180px; border-radius:50%;
  background:radial-gradient(circle,rgba(200,150,90,.18),transparent 70%);
  pointer-events:none;
}
.hero-icon{
  font-size:58px; display:block; margin-bottom:12px;
  filter:drop-shadow(0 0 16px rgba(200,150,90,.4));
}
.hero-title{
  font-family:var(--font-display); font-weight:800;
  font-size:24px; color:var(--mist); margin-bottom:6px;
}
.hero-sub{ font-size:13px; color:var(--mist-dim); line-height:1.6; margin-bottom:14px; }
.anon-badge{
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(74,124,111,.15); border:1px solid var(--pitch);
  color:#a9e6c4; font-size:12px; font-weight:700;
  padding:6px 16px; border-radius:99px;
}

/* ═══ Team Card ═══ */
.team-card{
  background:linear-gradient(135deg,rgba(200,150,90,.1),rgba(200,150,90,.04));
  border:1px solid rgba(200,150,90,.3);
  border-radius:var(--radius); padding:18px;
  margin-bottom:20px;
}
.team-card-header{
  display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.team-card-title{
  font-family:var(--font-display); font-weight:800;
  font-size:15px; color:var(--gold);
}
.team-card-sub{ font-size:11px; color:var(--mist-dim); margin-top:2px; }
.team-icon-wrap{
  width:40px; height:40px; border-radius:50%; flex-shrink:0;
  background:rgba(200,150,90,.15); border:1px solid rgba(200,150,90,.3);
  display:flex; align-items:center; justify-content:center; font-size:20px;
}
.member-pills{ display:flex; flex-wrap:wrap; gap:8px; }
.member-pill{
  display:flex; align-items:center; gap:7px;
  padding:7px 14px; border-radius:99px;
  background:rgba(255,255,255,.04); border:1px solid var(--line);
  font-size:13px; color:var(--mist);
}
.member-pill.is-me{
  background:rgba(200,150,90,.12); border-color:rgba(200,150,90,.4);
  color:var(--gold); font-weight:700;
}
.member-pill.is-leader{
  background:rgba(200,150,90,.2); border-color:rgba(200,150,90,.5);
}
.pill-avatar{
  width:26px; height:26px; border-radius:50%;
  background:var(--ink-3); border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:var(--mist-dim);
}
.member-pill.is-me .pill-avatar{
  background:rgba(200,150,90,.3); color:var(--gold); border-color:rgba(200,150,90,.5);
}
.leader-crown{ font-size:11px; margin-right:2px; }
.no-team-msg{
  text-align:center; padding:12px; color:var(--mist-dim); font-size:13px;
}

/* ═══ Write Card ═══ */
.write-card{
  background:linear-gradient(160deg,var(--ink-2),var(--ink-3));
  border:1px solid var(--line); border-radius:var(--radius);
  padding:20px; margin-bottom:20px;
}
.write-card label{
  font-family:var(--font-display); font-weight:700;
  font-size:13px; color:var(--mist-dim);
  text-transform:uppercase; letter-spacing:.5px;
  margin-bottom:10px; display:block;
}
.write-card textarea{
  width:100%; min-height:110px; resize:none;
}
.char-count{ font-size:11px; color:var(--mist-dim); text-align:left; margin-top:-8px; margin-bottom:14px; }

/* ═══ Feed ═══ */
.feed-header{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.feed-title{
  font-family:var(--font-display); font-weight:700;
  font-size:15px; color:var(--mist-dim);
  display:flex; align-items:center; gap:8px;
}
.new-badge{
  font-size:10px; font-weight:800; padding:2px 8px;
  border-radius:99px; background:var(--coral); color:#fff;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.secret-item{
  position:relative; overflow:hidden;
  background:linear-gradient(160deg,var(--ink-2),var(--ink-3));
  border:1px solid var(--line); border-radius:var(--radius-sm);
  padding:16px 18px 14px 44px; margin-bottom:10px;
  transition:border-color .2s;
}
.secret-item:hover{ border-color:rgba(200,150,90,.25); }
.secret-item::before{
  content:"🤫"; position:absolute; top:14px; left:14px;
  font-size:20px; opacity:.8;
}
.secret-item::after{
  content:"";
  position:absolute; top:0; right:0;
  width:3px; height:100%;
  background:linear-gradient(to bottom,var(--gold-dim),transparent);
}
.secret-text{ font-size:15px; color:var(--mist); line-height:1.7; }
.secret-time{ font-size:11px; color:var(--mist-dim); margin-top:8px; }

/* ═══ Sent Card ═══ */
.sent-card{
  text-align:center; padding:28px 20px;
  background:linear-gradient(160deg,var(--ink-2),var(--ink-3));
  border:1px solid var(--line); border-radius:var(--radius);
  margin-bottom:20px;
}
.sent-icon{ font-size:52px; display:block; margin-bottom:12px; }
.sent-title{ font-family:var(--font-display); font-weight:800; font-size:20px; color:var(--gold); margin-bottom:8px; }
.sent-sub{ font-size:13px; color:var(--mist-dim); line-height:1.6; margin-bottom:18px; }
.btn-ghost{
  background:rgba(200,150,90,.1); border:1px solid var(--line);
  color:var(--gold); font-family:var(--font-display); font-weight:700;
  font-size:13px; padding:10px 20px; border-radius:99px; cursor:pointer;
  transition:background .2s;
}
.btn-ghost:hover{ background:rgba(200,150,90,.18); }

.empty-feed{
  text-align:center; padding:36px 20px;
  color:var(--mist-dim); font-size:14px; line-height:1.8;
}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="dashboard.html" class="brand">
      <img src="logo.png" style="width:28px;height:28px;object-fit:contain"> Connect Three
    </a>
    <a href="#" class="logout-link" id="logoutBtn">خروج</a>
  </div>

  <!-- Hero -->
  <div class="page-hero">
    <div class="page-hero-glow"></div>
    <span class="hero-icon">📦</span>
    <div class="hero-title">صندوق الأسرار</div>
    <div class="hero-sub">اكتب سرك مجهول تماماً، والأدمن يختار الأسرار اللي تتنشر</div>
    <div class="anon-badge">🕵️ مجهول تماماً حتى عند الأدمن</div>
  </div>

  <!-- أعضاء الفريق -->
  <div class="team-card" id="teamSection" style="display:none">
    <div class="team-card-header">
      <div class="team-icon-wrap">🏅</div>
      <div>
        <div class="team-card-title" id="teamNameLabel">فريقك</div>
        <div class="team-card-sub">أعضاء الفريق</div>
      </div>
    </div>
    <div class="member-pills" id="teamMemberPills"></div>
  </div>

  <!-- Form الكتابة -->
  <div class="write-card" id="secretForm">
    <label>✍️ سرك</label>
    <textarea id="secretInput" placeholder="اكتب سرك هنا..." maxlength="250" rows="4"
      oninput="document.getElementById('sChar').textContent=this.value.length"></textarea>
    <div class="char-count"><span id="sChar">0</span> / 250</div>
    <button class="btn" onclick="submitSecret()">📦 ابعت السر</button>
    <div id="secretMsg" style="margin-top:10px;text-align:center;font-size:13px"></div>
  </div>

  <!-- بعد الإرسال -->
  <div class="sent-card" id="sentCard" style="display:none">
    <span class="sent-icon">🤫</span>
    <div class="sent-title">وصل الصندوق!</div>
    <div class="sent-sub">سرك اتحفظ بشكل مجهول تماماً<br>الأدمن ممكن ينشره وقت المؤتمر 🤐</div>
    <button class="btn-ghost" onclick="resetForm()">📦 ابعت سر تاني</button>
  </div>

  <!-- الأسرار المنشورة -->
  <div id="secretsFeed" style="display:none">
    <div class="feed-header">
      <div class="feed-title">
        🤫 أسرار نُشرت
        <span id="newSecretDot" class="new-badge" style="display:none">جديد!</span>
      </div>
      <span id="secretsCount" style="font-size:12px;color:var(--mist-dim)"></span>
    </div>
    <div id="secretsList"></div>
  </div>

  <!-- زرار الأدمن: ريست عداد الرسايل -->
  <div id="adminResetSection" style="display:none;margin-top:20px;text-align:center">
    <button class="btn-ghost" onclick="adminResetSecrets()" style="background:rgba(192,83,58,0.1);border-color:rgba(192,83,58,0.3);color:var(--coral)">
      🔄 ريست عداد الأسرار (أدمن)
    </button>
    <div id="adminResetMsg" style="font-size:12px;margin-top:8px;color:var(--mist-dim)"></div>
  </div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
var member = requireSession();
document.getElementById("logoutBtn").addEventListener("click", logout);

function esc(s){ return (s||"").replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

/* ── Team Section ── */
async function loadTeam(){
  if(!member) return;
  var res = await supabase.rpc("get_my_team_info", { p_member_id: member.id });
  if(res.error || !res.data || !res.data.length) return;
  var info = res.data[0];
  if(!info.team_name) return;

  document.getElementById("teamNameLabel").textContent = "🏅 " + info.team_name;
  document.getElementById("teamSection").style.display = "block";

  var r2 = await supabase.rpc("get_team_members", { p_team_name: info.team_name, p_member_id: member.id });
  if(r2.error || !r2.data) return;
  var pills = r2.data.map(function(p){
    var isLeader = p.role === "leader";
    var isMe = p.is_me;
    var cls = "member-pill" + (isMe?" is-me":"") + (isLeader?" is-leader":"");
    var init = (p.name||"؟").trim().charAt(0);
    return '<div class="'+cls+'">'+
      '<div class="pill-avatar">'+esc(init)+'</div>'+
      (isLeader?'<span class="leader-crown">👑</span>':'')+
      esc(p.name)+
      (isMe?' <span style="font-size:10px;opacity:.7">(أنت)</span>':'')+
    '</div>';
  }).join("");
  document.getElementById("teamMemberPills").innerHTML = pills;
}

/* ── الحد الأقصى للرسايل ── */
var MAX_MSGS = 3;

async function checkMySecretCount(){
  var res = await supabase
    .from("secret_box")
    .select("id", { count: "exact", head: true })
    .eq("member_id", member.id);
  return res.count || 0;
}

/* ── Form ── */
function resetForm(){
  document.getElementById("sentCard").style.display = "none";
  document.getElementById("secretForm").style.display = "block";
  document.getElementById("secretInput").value = "";
  document.getElementById("sChar").textContent = "0";
}

async function submitSecret(){
  var txt = (document.getElementById("secretInput").value||"").trim();
  var msg = document.getElementById("secretMsg");
  if(txt.length < 3){ msg.textContent="⚠️ السر قصير أوي!"; msg.style.color="var(--coral)"; return; }

  // تحقق من الحد الأقصى
  var count = await checkMySecretCount();
  if(count >= MAX_MSGS){
    msg.textContent="⛔ وصلت الحد الأقصى (" + MAX_MSGS + " أسرار) — انتظر الأدمن يعمل ريست";
    msg.style.color="var(--coral)"; return;
  }

  msg.textContent="";
  var btn = document.querySelector("#secretForm .btn");
  btn.disabled=true; btn.textContent="بنبعت...";
  var res = await supabase.rpc("submit_secret", { p_secret: txt, p_member_id: member.id });
  btn.disabled=false; btn.textContent="📦 ابعت السر";
  if(res.error){ msg.textContent="❌ مش قادر يبعت، حاول تاني"; msg.style.color="var(--coral)"; return; }
  document.getElementById("secretForm").style.display="none";
  document.getElementById("sentCard").style.display="block";
}

/* ── Feed ── */
var _knownIds=[];
async function loadSecrets(){
  var res = await supabase.rpc("get_published_secrets");
  if(res.error || !res.data || !res.data.length){ document.getElementById("secretsFeed").style.display="none"; return; }
  document.getElementById("secretsFeed").style.display="block";
  document.getElementById("secretsCount").textContent = res.data.length + " سر";
  var newOnes = res.data.filter(function(s){ return _knownIds.indexOf(s.id)===-1; });
  if(_knownIds.length>0 && newOnes.length>0) document.getElementById("newSecretDot").style.display="inline-block";
  _knownIds = res.data.map(function(s){ return s.id; });
  document.getElementById("secretsList").innerHTML = res.data.map(function(s){
    var t = new Date(s.published_at).toLocaleString("ar-EG",{hour:"2-digit",minute:"2-digit"});
    return '<div class="secret-item"><div class="secret-text">'+esc(s.secret)+'</div><div class="secret-time">'+t+'</div></div>';
  }).join("");
}

// Realtime — يتم التحديث التلقائي عبر js/realtime.js (مع إعادة المحاولة تلقائياً)

/* ── تحقق من الأدمن وعرض زرار الريست ── */
async function checkAdminSecret(){
  if(!member) return;
  var res = await supabase.from("members").select("role").eq("id", member.id).single();
  if(!res.error && res.data && res.data.role === "admin"){
    document.getElementById("adminResetSection").style.display = "block";
  }
}

/* ── ريست عداد الأسرار (أدمن بس) ── */
async function adminResetSecrets(){
  if(!confirm("هتعمل ريست للعداد؟ الناس هتقدر تبعت تاني من أول!")) return;
  var msg = document.getElementById("adminResetMsg");
  msg.textContent = "⏳ جاري الريست...";
  // نمسح الأسرار غير المنشورة بس
  var res = await supabase
    .from("secret_box")
    .delete()
    .eq("published", false);
  if(res.error){
    msg.textContent = "❌ مش قادر يعمل ريست: " + res.error.message;
    msg.style.color = "var(--coral)"; return;
  }
  msg.textContent = "✅ اتعمل الريست — الناس تقدر تبعت تاني";
  msg.style.color = "var(--pitch)";
  setTimeout(function(){ msg.textContent = ""; }, 4000);
}

loadTeam();
loadSecrets();
checkAdminSecret();
</script>
</body>
</html>
