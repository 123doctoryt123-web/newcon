<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صندوق الأسرار | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ─── Hero ─── */
.sb-hero{
  position:relative; text-align:center;
  padding:40px 20px 32px; margin-bottom:6px; overflow:hidden;
}
.sb-hero-glow{
  position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(200,150,90,.18),transparent 70%);
}
.sb-icon{
  font-size:68px; display:block; margin-bottom:14px; position:relative;
  filter:drop-shadow(0 0 24px rgba(200,150,90,.55));
  animation:iconFloat 4s ease-in-out infinite;
}
@keyframes iconFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
.sb-title{
  font-family:var(--font-display); font-weight:800;
  font-size:28px; color:var(--mist); letter-spacing:-.3px; margin-bottom:8px;
}
.sb-sub{ font-size:13px; color:var(--mist-dim); line-height:1.7; max-width:280px; margin:0 auto 18px; }
.anon-pill{
  display:inline-flex; align-items:center; gap:7px;
  background:rgba(74,124,111,.15); border:1px solid rgba(74,124,111,.4);
  color:#a9e6c4; font-size:12px; font-weight:700;
  padding:7px 18px; border-radius:99px;
  box-shadow:0 0 14px rgba(74,124,111,.1);
}

/* ─── Write Box ─── */
.write-box{
  position:relative; margin-bottom:16px;
  background:linear-gradient(160deg,var(--ink-2),var(--ink-3));
  border:1px solid var(--line); border-radius:var(--radius);
  padding:22px; overflow:hidden;
}
.write-box::before{
  content:""; position:absolute; top:0; right:0;
  width:3px; height:100%;
  background:linear-gradient(to bottom,var(--gold),transparent);
}
.write-box-label{
  font-family:var(--font-display); font-weight:700; font-size:12px;
  color:var(--mist-dim); text-transform:uppercase; letter-spacing:1px;
  margin-bottom:12px; display:flex; align-items:center; gap:8px;
}
.write-box-label::after{ content:""; flex:1; height:1px; background:var(--line); }
.write-box textarea{ width:100%; min-height:120px; resize:none; font-size:15px; }
.char-row{
  display:flex; align-items:center; justify-content:space-between;
  margin-top:-6px; margin-bottom:16px;
}
.char-row span{ font-size:11px; color:var(--mist-dim); }
.char-bar-wrap{ flex:1; height:2px; background:var(--line); border-radius:99px; margin:0 10px; overflow:hidden; }
.char-bar{ height:100%; border-radius:99px; background:var(--gold); transition:width .2s; width:0%; }

/* ─── Sent State ─── */
.sent-state{
  text-align:center; padding:36px 24px;
  background:linear-gradient(160deg,rgba(74,124,111,.1),rgba(74,124,111,.04));
  border:1px solid rgba(74,124,111,.35); border-radius:var(--radius);
  margin-bottom:16px;
}
.sent-big{ font-size:56px; display:block; margin-bottom:14px;
  animation:sentPop .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes sentPop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.sent-title{ font-family:var(--font-display); font-weight:800; font-size:22px; color:#a9e6c4; margin-bottom:8px; }
.sent-sub{ font-size:13px; color:var(--mist-dim); line-height:1.7; margin-bottom:20px; }
.btn-outline-gold{
  background:rgba(200,150,90,.1); border:1px solid rgba(200,150,90,.35);
  color:var(--gold); font-family:var(--font-display); font-weight:700;
  font-size:13px; padding:11px 22px; border-radius:99px; cursor:pointer;
  transition:all .2s;
}
.btn-outline-gold:hover{ background:rgba(200,150,90,.2); }

/* ─── Feed ─── */
.feed-sep{
  display:flex; align-items:center; gap:10px;
  margin:8px 0 16px; color:var(--mist-dim);
}
.feed-sep::before,.feed-sep::after{ content:""; flex:1; height:1px; background:var(--line); }
.feed-sep span{ font-size:12px; font-weight:700; white-space:nowrap; }
.feed-count{
  display:inline-block; background:rgba(200,150,90,.15);
  border:1px solid rgba(200,150,90,.25); color:var(--gold);
  font-size:10px; font-weight:800; padding:2px 8px; border-radius:99px;
  margin-right:6px;
}
.new-badge{
  display:inline-block; background:var(--coral); color:#fff;
  font-size:10px; font-weight:800; padding:2px 8px; border-radius:99px;
  animation:blink 1.5s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.secret-card{
  position:relative; overflow:hidden;
  background:linear-gradient(160deg,var(--ink-2),var(--ink-3));
  border:1px solid var(--line); border-radius:var(--radius-sm);
  padding:18px 20px 14px 52px; margin-bottom:10px;
  transition:border-color .2s, transform .15s;
}
.secret-card:hover{ border-color:rgba(200,150,90,.3); transform:translateX(-2px); }
.secret-card-icon{
  position:absolute; top:50%; right:16px; transform:translateY(-50%);
  font-size:22px; opacity:.7;
}
.secret-card::before{
  content:""; position:absolute; top:0; left:0;
  width:3px; height:100%;
  background:linear-gradient(to bottom,var(--gold-dim),transparent);
}
.secret-text{ font-size:15px; color:var(--mist); line-height:1.75; }
.secret-time{ font-size:11px; color:var(--mist-dim); margin-top:8px; }

.empty-feed{ text-align:center; padding:40px 20px; color:var(--mist-dim); font-size:14px; line-height:2; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="dashboard.html" class="brand">
      <img src="logo.png" style="width:28px;height:28px;object-fit:contain"> Connect Three
    </a>
    <a href="#" class="logout-link" id="logoutBtn">خروج</a>
  </div>

  <div class="sb-hero">
    <div class="sb-hero-glow"></div>
    <span class="sb-icon">📦</span>
    <div class="sb-title">صندوق الأسرار</div>
    <div class="sb-sub">اكتب سرك بشكل مجهول تماماً، والأدمن يختار اللي يتنشر وقت المؤتمر</div>
    <div class="anon-pill">🕵️ مجهول تماماً حتى عند الأدمن</div>
  </div>

  <!-- Write -->
  <div class="write-box" id="secretForm">
    <div class="write-box-label">✍️ سرك</div>
    <textarea id="secretInput" placeholder="اكتب سرك هنا..." maxlength="250" rows="4"
      oninput="onType()"></textarea>
    <div class="char-row">
      <span><span id="sChar">0</span> / 250</span>
      <div class="char-bar-wrap"><div class="char-bar" id="charBar"></div></div>
    </div>
    <button class="btn" id="submitBtn" onclick="submitSecret()">📦 ابعت السر</button>
    <div id="secretMsg" style="margin-top:10px;text-align:center;font-size:13px"></div>
  </div>

  <!-- Sent -->
  <div class="sent-state" id="sentCard" style="display:none">
    <span class="sent-big">🤫</span>
    <div class="sent-title">وصل الصندوق!</div>
    <div class="sent-sub">سرك اتحفظ بشكل مجهول تماماً<br>هيظهر لما الأدمن ينشره وقت المؤتمر 🤐</div>
    <button class="btn-outline-gold" onclick="resetForm()">📦 ابعت سر تاني</button>
  </div>

  <!-- Feed -->
  <div id="secretsFeed" style="display:none">
    <div class="feed-sep">
      <span>🤫 أسرار نُشرت <span id="secretsCount" class="feed-count"></span><span id="newBadge" class="new-badge" style="display:none">جديد!</span></span>
    </div>
    <div id="secretsList"></div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
var member = requireSession();
document.getElementById("logoutBtn").addEventListener("click", logout);
function esc(s){ return (s||"").replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

function onType(){
  var v = document.getElementById("secretInput").value;
  document.getElementById("sChar").textContent = v.length;
  document.getElementById("charBar").style.width = (v.length/250*100)+"%";
}
function resetForm(){
  document.getElementById("sentCard").style.display="none";
  document.getElementById("secretForm").style.display="block";
  document.getElementById("secretInput").value="";
  document.getElementById("sChar").textContent="0";
  document.getElementById("charBar").style.width="0%";
}
async function submitSecret(){
  var txt=(document.getElementById("secretInput").value||"").trim();
  var msg=document.getElementById("secretMsg");
  if(txt.length<3){msg.textContent="⚠️ السر قصير أوي!";msg.style.color="var(--coral)";return;}
  msg.textContent="";
  var btn=document.getElementById("submitBtn");
  btn.disabled=true;btn.textContent="بنبعت...";
  var res=await supabase.rpc("submit_secret",{p_secret:txt});
  btn.disabled=false;btn.textContent="📦 ابعت السر";
  if(res.error){msg.textContent="❌ مش قادر يبعت، حاول تاني";msg.style.color="var(--coral)";return;}
  document.getElementById("secretForm").style.display="none";
  document.getElementById("sentCard").style.display="block";
}
var _knownIds=[];
async function loadSecrets(){
  var res=await supabase.rpc("get_published_secrets");
  if(res.error||!res.data||!res.data.length){document.getElementById("secretsFeed").style.display="none";return;}
  document.getElementById("secretsFeed").style.display="block";
  document.getElementById("secretsCount").textContent=res.data.length;
  var newOnes=res.data.filter(function(s){return _knownIds.indexOf(s.id)===-1;});
  if(_knownIds.length>0&&newOnes.length>0) document.getElementById("newBadge").style.display="inline-block";
  _knownIds=res.data.map(function(s){return s.id;});
  document.getElementById("secretsList").innerHTML=res.data.map(function(s){
    var t=new Date(s.published_at).toLocaleString("ar-EG",{hour:"2-digit",minute:"2-digit"});
    return '<div class="secret-card"><div class="secret-card-icon">🤫</div><div class="secret-text">'+esc(s.secret)+'</div><div class="secret-time">'+t+'</div></div>';
  }).join("");
}
supabase.channel("rt-secrets")
  .on("postgres_changes",{event:"INSERT",schema:"public",table:"secret_box"},loadSecrets)
  .on("postgres_changes",{event:"UPDATE",schema:"public",table:"secret_box"},loadSecrets)
  .subscribe();
loadSecrets();
</script>
</body>
</html>
