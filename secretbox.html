<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صندوق الأسرار | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<style>
.secret-hero{
  text-align:center; padding:28px 16px 8px;
}
.secret-hero .emoji{
  font-size:54px; display:block; margin-bottom:10px;
}
.secret-hero h1{
  font-family:var(--font-display); font-size:21px; color:var(--mist);
  margin-bottom:6px;
}
.secret-hero p{ font-size:13px; color:var(--mist-dim); line-height:1.6; }

.anon-badge{
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(74,124,111,0.15); border:1px solid var(--pitch);
  color:#a9e6c4; font-size:12px; font-weight:700;
  padding:5px 14px; border-radius:99px; margin:10px 0 18px;
}

.char-count{ font-size:11px; color:var(--mist-dim); text-align:left; margin-top:-10px; margin-bottom:14px; }

.secrets-feed{ margin-top:24px; }
.secrets-feed h2{
  font-family:var(--font-display); font-size:15px; color:var(--mist-dim);
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.secret-item{
  background: linear-gradient(160deg, var(--ink-2), var(--ink-3));
  border:1px solid var(--line);
  border-radius:var(--radius-sm);
  padding:16px 18px; margin-bottom:12px;
  position:relative;
}
.secret-item::before{
  content:"🤫"; position:absolute; top:12px; left:14px;
  font-size:18px; opacity:0.7;
}
.secret-text{
  font-size:15px; color:var(--mist); line-height:1.7;
  padding-right:10px;
}
.secret-time{
  font-size:11px; color:var(--mist-dim); margin-top:8px;
}
.new-badge{
  display:inline-block; background:var(--coral); color:#fff;
  font-size:10px; font-weight:800; padding:2px 8px; border-radius:99px;
  margin-right:6px; vertical-align:middle;
  animation: pulse 1.5s infinite;
}
@keyframes pulse{ 0%,100%{opacity:1}50%{opacity:.5} }

.sent-card{
  text-align:center; padding:20px;
}
.sent-card .big-icon{ font-size:48px; margin-bottom:10px; display:block; }

.empty-state{
  text-align:center; padding:30px;
  color:var(--mist-dim); font-size:14px; line-height:1.8;
}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="dashboard.html" class="brand">
      <img src="logo.png" style="width:28px;height:28px;object-fit:contain"> Connect Three
    </a>
    <a href="#" class="logout-link" id="logoutBtn">خروج</a>
  </div>

  <div class="secret-hero">
    <span class="emoji">📦</span>
    <h1>صندوق الأسرار</h1>
    <p>اكتب سرك مجهول تماماً، والأدمن يختار الأسرار اللي تتنشر</p>
    <div class="anon-badge">🕵️ مجهول تماماً حتى عند الأدمن</div>
  </div>

  <!-- Form الكتابة -->
  <div class="card" id="secretForm">
    <label>سرك:</label>
    <textarea id="secretInput" placeholder="اكتب سرك هنا..." maxlength="250" rows="4"
      oninput="document.getElementById('sChar').textContent=this.value.length"></textarea>
    <div class="char-count"><span id="sChar">0</span> / 250</div>
    <button class="btn" onclick="submitSecret()">📦 ابعت السر</button>
    <div id="secretMsg" style="margin-top:10px;text-align:center;font-size:13px"></div>
  </div>

  <!-- بعد الإرسال -->
  <div class="card sent-card" id="sentCard" style="display:none">
    <span class="big-icon">✅</span>
    <h3 style="color:var(--gold);font-family:var(--font-display);margin-bottom:6px">وصل الصندوق!</h3>
    <p style="color:var(--mist-dim);font-size:13px">سرك اتحفظ بشكل مجهول تماماً، الأدمن ممكن ينشره وقت المؤتمر 🤫</p>
    <button class="btn" style="margin-top:14px;background:rgba(200,150,90,0.1);border:1px solid var(--line);color:var(--gold)"
      onclick="resetForm()">📦 ابعت سر تاني</button>
  </div>

  <!-- الأسرار المنشورة -->
  <div class="secrets-feed" id="secretsFeed" style="display:none">
    <h2>🤫 أسرار نُشرت <span id="newSecretDot" class="new-badge" style="display:none">جديد!</span></h2>
    <div id="secretsList"></div>
  </div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
var member = requireSession();
document.getElementById("logoutBtn").addEventListener("click", logout);

function esc(s){ return (s||"").replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

function resetForm(){
  document.getElementById("sentCard").style.display = "none";
  document.getElementById("secretForm").style.display = "block";
  document.getElementById("secretInput").value = "";
  document.getElementById("sChar").textContent = "0";
}

async function submitSecret(){
  var txt = (document.getElementById("secretInput").value||"").trim();
  var msg = document.getElementById("secretMsg");
  if(txt.length < 3){
    msg.textContent = "⚠️ السر قصير أوي!";
    msg.style.color = "var(--coral)"; return;
  }
  msg.textContent = ""; 
  var btn = document.querySelector("#secretForm .btn");
  btn.disabled = true; btn.textContent = "بنبعت...";

  var res = await supabase.rpc("submit_secret", { p_secret: txt });
  btn.disabled = false; btn.textContent = "📦 ابعت السر";

  if(res.error){
    msg.textContent = "❌ مش قادر يبعت، حاول تاني";
    msg.style.color = "var(--coral)"; return;
  }
  document.getElementById("secretForm").style.display = "none";
  document.getElementById("sentCard").style.display = "block";
}

var _knownIds = [];

async function loadSecrets(){
  var res = await supabase.rpc("get_published_secrets");
  if(res.error || !res.data || res.data.length === 0){
    document.getElementById("secretsFeed").style.display = "none"; return;
  }
  document.getElementById("secretsFeed").style.display = "block";

  var newOnes = res.data.filter(function(s){ return _knownIds.indexOf(s.id) === -1; });
  if(_knownIds.length > 0 && newOnes.length > 0){
    document.getElementById("newSecretDot").style.display = "inline-block";
  }
  _knownIds = res.data.map(function(s){ return s.id; });

  var html = "";
  res.data.forEach(function(s){
    var d = new Date(s.published_at);
    var t = d.toLocaleString("ar-EG", { hour:"2-digit", minute:"2-digit" });
    html += '<div class="secret-item">'
          + '<div class="secret-text">' + esc(s.secret) + '</div>'
          + '<div class="secret-time">' + t + '</div>'
          + '</div>';
  });
  document.getElementById("secretsList").innerHTML = html;
}

// Realtime: لما أدمن ينشر سر
supabase.channel("rt-secrets")
  .on("postgres_changes", { event:"INSERT", schema:"public", table:"secret_box" }, loadSecrets)
  .on("postgres_changes", { event:"UPDATE", schema:"public", table:"secret_box" }, loadSecrets)
  .subscribe();

loadSecrets();
</script>
</body>
</html>
