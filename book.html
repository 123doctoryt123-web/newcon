<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>درس الكتاب | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<style>
.bq-form-card{
  position:relative; overflow:hidden;
  background: linear-gradient(150deg, #16273d, var(--ink-2) 55%, var(--ink-3));
  border:1px solid var(--line); border-radius:var(--radius);
  padding:22px 20px; margin-bottom:18px;
}
.bq-form-card::before{
  content:""; position:absolute; top:-40px; right:-40px;
  width:150px; height:150px;
  background: radial-gradient(circle, rgba(74,124,111,0.18), transparent 70%);
  pointer-events:none;
}
.bq-textarea{
  width:100%; min-height:90px; resize:none;
  background: rgba(6,15,24,0.5);
  border:1px solid var(--line); border-radius:12px;
  padding:12px 14px; color:var(--mist);
  font-family:var(--font-body); font-size:14px; line-height:1.6;
  outline:none; box-sizing:border-box; margin-bottom:12px;
  transition: border-color .2s;
}
.bq-textarea:focus{ border-color: rgba(74,124,111,0.5); }
.bq-textarea::placeholder{ color:var(--mist-dim); }
.bq-send-btn{
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; padding:13px 20px; border:none; border-radius:99px; cursor:pointer;
  background: linear-gradient(135deg, var(--pitch), var(--pitch-dim));
  color:#fff; font-family:var(--font-display); font-weight:700; font-size:14px;
  transition: filter .15s, transform .1s;
}
.bq-send-btn:hover{ filter:brightness(1.15); }
.bq-send-btn:active{ transform:scale(.98); }
.bq-send-btn:disabled{ opacity:.5; cursor:not-allowed; }
.bq-anon-note{
  display:flex; align-items:center; gap:6px;
  font-size:11px; color:var(--mist-dim); margin-bottom:14px;
}

/* ── Wall ── */
.bq-wall-header{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.bq-wall-title{
  font-family:var(--font-display); font-weight:800; font-size:15px; color:var(--mist);
  display:flex; align-items:center; gap:8px;
}
.bq-count-pill{
  font-size:11px; color:var(--pitch);
  background:rgba(74,124,111,0.12); border:1px solid rgba(74,124,111,0.25);
  border-radius:99px; padding:2px 10px;
  font-family:var(--font-display); font-weight:700;
}
.bq-item{
  position:relative;
  background: linear-gradient(160deg, var(--ink-2), var(--ink-3));
  border:1px solid var(--line); border-radius:14px;
  padding:14px 16px; margin-bottom:10px;
}
.bq-item-text{
  font-size:14px; color:var(--mist); line-height:1.65;
  margin-bottom:6px; padding-left:28px;
}
.bq-item-meta{
  font-size:11px; color:var(--mist-dim);
}
.bq-item-q{
  position:absolute; top:14px; right:16px;
  font-size:18px; opacity:.35;
}
.bq-del-btn{
  background:none; border:1px solid rgba(192,83,58,0.3); border-radius:99px;
  color:var(--coral); font-size:11px; padding:3px 10px; cursor:pointer;
  font-family:var(--font-display); font-weight:700; margin-top:6px;
  transition: background .15s;
}
.bq-del-btn:hover{ background:rgba(192,83,58,0.12); }
.bq-clear-btn{
  display:flex; align-items:center; gap:6px;
  background:none; border:1px solid rgba(192,83,58,0.35); border-radius:99px;
  color:var(--coral); font-size:12px; padding:6px 14px; cursor:pointer;
  font-family:var(--font-display); font-weight:700;
  transition: background .15s;
}
.bq-clear-btn:hover{ background:rgba(192,83,58,0.12); }
.bq-sent-msg{
  text-align:center; padding:16px 10px;
  color:var(--pitch); font-family:var(--font-display); font-weight:700; font-size:15px;
}
</style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <a href="dashboard.html" class="brand">
      <img src="logo.png" style="width:28px;height:28px;object-fit:contain;">
      Connect Three
    </a>
    <a href="#" class="logout-link" id="logoutBtn">خروج</a>
  </div>

  <h1 class="display" style="font-size:20px;margin-bottom:6px">📖 درس الكتاب</h1>
  <p style="color:var(--mist-dim);font-size:13px;margin-bottom:18px">اسأل سؤالك بشكل مجهول — محدش هيعرف مين سأل</p>

  <!-- ── فورم البعت ── -->
  <div class="bq-form-card">
    <div id="bqFormWrap">
      <div class="bq-anon-note">
        <span>🕵️</span>
        <span>سؤالك هيتنشر مجهول تماماً — اسمك مش هيظهر لحد</span>
      </div>
      <textarea class="bq-textarea" id="bqInput" placeholder="اكتب سؤالك هنا…" maxlength="500"></textarea>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span id="bqCharCount" style="font-size:11px;color:var(--mist-dim)">0 / 500</span>
      </div>
      <button class="bq-send-btn" id="bqSendBtn" onclick="sendQuestion()">
        <span>📨</span> ابعت سؤالك
      </button>
    </div>
    <div id="bqSentMsg" style="display:none" class="bq-sent-msg">
      ✅ اتبعت سؤالك! هيظهر في الوول دلوقتي
      <br>
      <button onclick="resetForm()" style="margin-top:12px;background:none;border:1px solid var(--line);border-radius:99px;color:var(--mist-dim);padding:7px 18px;cursor:pointer;font-family:var(--font-display);font-size:13px">ابعت سؤال تاني</button>
    </div>
  </div>

  <!-- ── Wall of Questions ── -->
  <div class="bq-wall-header">
    <div class="bq-wall-title">
      💬 أسئلة الدرس
      <span class="bq-count-pill" id="bqCount">0</span>
    </div>
    <!-- زرار مسح الكل — للأدمن بس -->
    <button class="bq-clear-btn" id="bqResetCountBtn" style="display:none;background:rgba(200,150,90,0.08);border-color:rgba(200,150,90,0.3);color:var(--gold);margin-bottom:8px" onclick="adminResetBookCounts()">
      🔄 ريست العداد (يبعتوا تاني)
    </button>
    <button class="bq-clear-btn" id="bqClearAllBtn" style="display:none" onclick="clearAll()">
      🗑️ مسح الكل
    </button>
  </div>

  <div id="bqFeed">
    <div class="empty-state" id="bqEmpty">
      <div style="font-size:36px;margin-bottom:10px">💬</div>
      <div>لسه مفيش أسئلة — كن أول واحد!</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
var member = requireSession();
document.getElementById("logoutBtn").addEventListener("click", logout);

var isAdmin = false;

// تحقق من الأدمن
(async function checkAdmin(){
  if(!member) return;
  var res = await supabase.from("members").select("role").eq("id", member.id).single();
  if(!res.error && res.data && res.data.role === "admin"){
    isAdmin = true;
    document.getElementById("bqClearAllBtn").style.display = "flex";
    document.getElementById("bqResetCountBtn").style.display = "flex";
  }
})();

// عداد الحروف
document.getElementById("bqInput").addEventListener("input", function(){
  document.getElementById("bqCharCount").textContent = this.value.length + " / 500";
});

var MAX_BOOK_MSGS = 3;

async function checkMyBookCount(){
  var res = await supabase
    .from("book_questions")
    .select("id", { count: "exact", head: true })
    .eq("member_id", member.id);
  return res.count || 0;
}

async function sendQuestion(){
  var txt = document.getElementById("bqInput").value.trim();
  if(!txt){ return; }

  // تحقق من الحد الأقصى
  var count = await checkMyBookCount();
  if(count >= MAX_BOOK_MSGS){
    alert("⛔ وصلت الحد الأقصى (" + MAX_BOOK_MSGS + " أسئلة) — انتظر الأدمن يعمل ريست");
    return;
  }

  var btn = document.getElementById("bqSendBtn");
  btn.disabled = true;
  btn.innerHTML = "<span>⏳</span> بيتبعت...";

  var res = await supabase.rpc("submit_book_question", { p_question: txt });
  btn.disabled = false;
  btn.innerHTML = "<span>📨</span> ابعت سؤالك";

  if(res.error){
    alert("❌ مش قادر يبعت، حاول تاني");
    return;
  }
  document.getElementById("bqFormWrap").style.display = "none";
  document.getElementById("bqSentMsg").style.display = "block";
}

function resetForm(){
  document.getElementById("bqInput").value = "";
  document.getElementById("bqCharCount").textContent = "0 / 500";
  document.getElementById("bqFormWrap").style.display = "block";
  document.getElementById("bqSentMsg").style.display = "none";
}

function timeAgo(dateStr){
  var diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
  if(diff < 60) return "دلوقتي";
  if(diff < 3600) return Math.floor(diff/60) + " دقيقة";
  if(diff < 86400) return Math.floor(diff/3600) + " ساعة";
  return Math.floor(diff/86400) + " يوم";
}

async function loadQuestions(){
  var res = await supabase.rpc("get_book_questions");
  var feed = document.getElementById("bqFeed");
  var empty = document.getElementById("bqEmpty");
  var countEl = document.getElementById("bqCount");

  if(res.error || !res.data || !res.data.length){
    countEl.textContent = "0";
    feed.innerHTML = '<div class="empty-state" id="bqEmpty"><div style="font-size:36px;margin-bottom:10px">💬</div><div>لسه مفيش أسئلة — كن أول واحد!</div></div>';
    return;
  }

  countEl.textContent = res.data.length;
  feed.innerHTML = res.data.map(function(q, i){
    var adminBtns = isAdmin
      ? '<div><button class="bq-del-btn" onclick="deleteQ(' + q.id + ')">🗑️ حذف</button></div>'
      : '';
    return '<div class="bq-item" id="bqItem-' + q.id + '">'
         + '<div class="bq-item-q">❓</div>'
         + '<div class="bq-item-text">' + escHtml(q.question) + '</div>'
         + '<div class="bq-item-meta">منذ ' + timeAgo(q.created_at) + '</div>'
         + adminBtns
         + '</div>';
  }).join("");
}

async function deleteQ(id){
  if(!isAdmin) return;
  if(!confirm("تحذف السؤال ده؟")) return;
  await supabase.rpc("admin_delete_book_question", { p_id: id, p_admin_id: member.id });
  var el = document.getElementById("bqItem-" + id);
  if(el){ el.style.opacity="0"; el.style.transition="opacity .3s"; setTimeout(function(){ el.remove(); loadQuestions(); }, 300); }
}

async function clearAll(){
  if(!isAdmin) return;
  if(!confirm("هتمسح كل الأسئلة؟ مفيش رجعة!")) return;
  await supabase.rpc("admin_clear_book_questions", { p_admin_id: member.id });
  loadQuestions();
}

/* ── ريست عداد أسئلة الكتاب (أدمن) ── */
async function adminResetBookCounts(){
  if(!isAdmin) return;
  if(!confirm("هتعمل ريست للعداد؟ الناس هتقدر تبعت أسئلة تاني!")) return;
  // نمسح كل أسئلة الكتاب (ريست كامل للعداد)
  var res = await supabase.rpc("admin_clear_book_questions", { p_admin_id: member.id });
  if(res.error){ alert("❌ مش قادر يعمل ريست"); return; }
  alert("✅ اتعمل الريست — الناس تقدر تبعت تاني");
  loadQuestions();
}

function escHtml(s){
  return (s||"").replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

// Real-time
supabase.channel("rt-book-questions")
  .on("postgres_changes", { event: "INSERT", schema: "public", table: "book_questions" }, loadQuestions)
  .on("postgres_changes", { event: "DELETE", schema: "public", table: "book_questions" }, loadQuestions)
  .subscribe();

loadQuestions();
</script>
<script src="js/realtime.js"></script>
</body>
</html>
