<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Three | مؤتمر الشباب</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <img src="logo.png" alt="Connect Three" class="login-logo-img">
    <div class="login-logo">CONNECT <span>THREE</span></div>
    <div class="login-sub">WAY · TRUTH · LIFE — سجّل دخولك</div>
    <div class="card glow">
      <div id="errorMsg" class="error-msg"></div>
      <label for="usernameInput">اليوزر</label>
      <input type="text" id="usernameInput" placeholder="مثال: y4821" autocomplete="username">
      <label for="passwordInput">الباسورد</label>
      <input type="password" id="passwordInput" placeholder="••••••" autocomplete="current-password">
      <button class="btn" id="loginBtn">دخول</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
  if(getSession()) window.location.href = "dashboard.html";

  async function doLogin(){
    var username = document.getElementById("usernameInput").value.trim();
    var password = document.getElementById("passwordInput").value.trim();
    var errBox = document.getElementById("errorMsg");
    var btn = document.getElementById("loginBtn");
    errBox.style.display = "none";

    if(!username || !password){
      errBox.textContent = "اكتب اليوزر والباسورد";
      errBox.style.display = "block";
      return;
    }

    btn.disabled = true; btn.textContent = "بندخّل...";

    var res = await supabase.rpc("verify_login", { p_username: username, p_password: password });

    btn.disabled = false; btn.textContent = "دخول";

    if(res.error || !res.data || res.data.length === 0){
      errBox.textContent = "اليوزر أو الباسورد غلط";
      errBox.style.display = "block";
      return;
    }

    saveSession({ id: res.data[0].id, name: res.data[0].name, username: username });
    window.location.href = "dashboard.html";
  }

  document.getElementById("loginBtn").addEventListener("click", doLogin);
  document.getElementById("passwordInput").addEventListener("keydown", function(e){
    if(e.key === "Enter") doLogin();
  });
</script>
</body>
</html>
