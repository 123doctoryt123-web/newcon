<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الليدربورد 🏆 | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ══════════════════════════════════════════
   Header
══════════════════════════════════════════ */
.lb-header{
  text-align:center;
  padding: 28px 0 20px;
  position:relative;
}
.lb-title{
  font-family:var(--font-display);
  font-weight:800;
  font-size:26px;
  color:var(--mist);
  margin-bottom:6px;
}
.lb-subtitle{
  font-size:12px;
  color:var(--mist-dim);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.live-dot{
  width:7px; height:7px; border-radius:50%;
  background:var(--pitch);
  box-shadow:0 0 0 0 rgba(74,124,111,.7);
  animation:pulse 2s infinite;
  display:inline-block;
}
@keyframes pulse{
  0%  { box-shadow:0 0 0 0   rgba(74,124,111,.7); }
  60% { box-shadow:0 0 0 8px rgba(74,124,111,0);  }
  100%{ box-shadow:0 0 0 0   rgba(74,124,111,0);  }
}

/* ══════════════════════════════════════════
   Tabs
══════════════════════════════════════════ */
.lb-tabs{
  display:flex;
  background:var(--ink-2);
  border:1px solid var(--line);
  border-radius:99px;
  padding:4px;
  margin-bottom:18px;
  gap:4px;
}
.lb-tab{
  flex:1; text-align:center;
  padding:9px 0;
  border-radius:99px;
  font-family:var(--font-display);
  font-weight:700;
  font-size:13px;
  color:var(--mist-dim);
  cursor:pointer;
  transition:all .2s;
  border:none;
  background:transparent;
}
.lb-tab.active{
  background:linear-gradient(135deg,var(--gold),var(--gold-dim));
  color:var(--ink);
}

/* ══════════════════════════════════════════
   Members Leaderboard
══════════════════════════════════════════ */
.lb-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.lb-row{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 16px;
  border-radius:var(--radius-sm);
  background:linear-gradient(160deg,var(--ink-2),var(--ink-3));
  border:1px solid var(--line);
  transition:transform .15s, border-color .2s;
  position:relative;
  overflow:hidden;
}

/* المتسابق نفسه */
.lb-row.is-me{
  border-color:rgba(200,150,90,.5);
  background:linear-gradient(160deg, rgba(200,150,90,.1), rgba(200,150,90,.04));
}
.lb-row.is-me::before{
  content:"أنت";
  position:absolute;
  top:6px; left:10px;
  font-size:9px;
  font-weight:800;
  color:var(--gold);
  opacity:.7;
  letter-spacing:.5px;
}

/* المراكز الأولى */
.lb-row.rank-1{
  border-color:rgba(200,150,90,.6);
  background:linear-gradient(160deg, rgba(200,150,90,.14), rgba(200,150,90,.04));
}
.lb-row.rank-2{
  border-color:rgba(180,180,200,.3);
  background:linear-gradient(160deg, rgba(180,180,200,.06), var(--ink-3));
}
.lb-row.rank-3{
  border-color:rgba(192,83,58,.35);
  background:linear-gradient(160deg, rgba(192,83,58,.08), var(--ink-3));
}

.lb-rank{
  width:32px; height:32px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display);
  font-weight:800;
  font-size:13px;
  flex-shrink:0;
}
.rank-num-1{ background:linear-gradient(135deg,#D4AF37,#a07840); color:#fff; font-size:16px; }
.rank-num-2{ background:linear-gradient(135deg,#B0B8C8,#7a8498); color:#fff; }
.rank-num-3{ background:linear-gradient(135deg,#C0753A,#8a4e28); color:#fff; }
.rank-num-n{ background:var(--ink-3); color:var(--mist-dim); }

.lb-avatar{
  width:40px; height:40px;
  border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-display); font-weight:800;
  font-size:17px;
  background:linear-gradient(135deg,var(--ink-3),var(--ink-2));
  border:1px solid var(--line);
  color:var(--mist-dim);
}
.lb-row.is-me .lb-avatar{
  background:linear-gradient(135deg,rgba(200,150,90,.3),rgba(200,150,90,.1));
  border-color:rgba(200,150,90,.5);
  color:var(--gold);
}
.lb-row.rank-1 .lb-avatar{
  background:linear-gradient(135deg,rgba(200,150,90,.35),rgba(200,150,90,.12));
  border-color:rgba(200,150,90,.6);
  color:var(--gold);
  box-shadow:0 0 14px rgba(200,150,90,.25);
}

.lb-info{ flex:1; min-width:0; }
.lb-name{
  font-size:14px; font-weight:700; color:var(--mist);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.lb-row.is-me .lb-name{ color:var(--gold); }
.lb-team-badge{
  display:inline-block;
  font-size:10px;
  padding:2px 8px;
  border-radius:99px;
  background:rgba(200,150,90,.1);
  color:var(--gold-dim);
  margin-top:3px;
  border:1px solid rgba(200,150,90,.2);
}

.lb-points{
  font-family:var(--font-display);
  font-weight:800;
  font-size:20px;
  color:var(--mist-dim);
  flex-shrink:0;
}
.lb-row.is-me .lb-points{ color:var(--gold); }
.lb-row.rank-1 .lb-points{ color:var(--gold); }
.lb-pts-label{ font-size:9px; color:var(--mist-dim); display:block; text-align:left; margin-top:-2px; }

/* shimmer skeleton */
.skeleton{
  border-radius:var(--radius-sm);
  background:linear-gradient(90deg,var(--ink-2) 25%,var(--ink-3) 50%,var(--ink-2) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
}
@keyframes shimmer{ to{ background-position:-200% 0; } }
.skel-row{ height:68px; margin-bottom:10px; }

/* ══════════════════════════════════════════
   Team Leaderboard
══════════════════════════════════════════ */
.team-card{
  border-radius:var(--radius);
  padding:20px;
  background:linear-gradient(160deg,var(--ink-2),var(--ink-3));
  border:1px solid var(--line);
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
  transition:border-color .2s;
}
.team-card.is-my-team{
  border-color:rgba(200,150,90,.5);
}
.team-card.is-my-team::after{
  content:"فريقك";
  position:absolute;
  top:12px; left:16px;
  font-size:9px; font-weight:800;
  color:var(--gold); opacity:.7;
  letter-spacing:.5px;
}

.team-rank-badge{
  position:absolute;
  top:50%; right:18px;
  transform:translateY(-50%);
  font-size:36px;
  opacity:.35;
}

.team-name{
  font-family:var(--font-display);
  font-weight:800;
  font-size:17px;
  color:var(--mist);
  margin-bottom:8px;
}
.team-card.is-my-team .team-name{ color:var(--gold); }

.team-bar-track{
  height:8px;
  border-radius:99px;
  background:rgba(255,255,255,.06);
  overflow:hidden;
  margin-bottom:8px;
}
.team-bar-fill{
  height:100%;
  border-radius:99px;
  transition:width .8s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(90deg,var(--gold-dim),var(--gold));
}
.team-card.is-my-team .team-bar-fill{
  background:linear-gradient(90deg,var(--gold),#e8b96e);
  box-shadow:0 0 10px rgba(200,150,90,.4);
}

.team-meta{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.team-points-big{
  font-family:var(--font-display);
  font-weight:800;
  font-size:24px;
  color:var(--gold);
}
.team-members-count{
  font-size:11px;
  color:var(--mist-dim);
}

/* ══════════════════════════════════════════
   Refresh indicator
══════════════════════════════════════════ */
.refresh-bar{
  height:2px;
  background:rgba(200,150,90,.15);
  border-radius:99px;
  overflow:hidden;
  margin-bottom:16px;
}
.refresh-progress{
  height:100%;
  background:linear-gradient(90deg,var(--gold-dim),var(--gold));
  border-radius:99px;
  transition:width .5s linear;
}

.last-updated{
  text-align:center;
  font-size:11px;
  color:var(--mist-dim);
  margin-bottom:14px;
}

/* ══════════════════════════════════════════
   My rank sticky card
══════════════════════════════════════════ */
.my-rank-pill{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:rgba(200,150,90,.1);
  border:1px solid rgba(200,150,90,.3);
  border-radius:99px;
  padding:9px 18px;
  margin-bottom:16px;
  font-size:13px;
  color:var(--gold);
  font-weight:700;
}
.my-rank-pill .pill-rank{
  font-family:var(--font-display);
  font-weight:800;
  font-size:18px;
}

.empty-lb{
  text-align:center;
  padding:40px 0;
  color:var(--mist-dim);
  font-size:14px;
}
</style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <div class="brand"><span class="dot"></span> Connect Three</div>
    <a href="dashboard.html" class="logout-link">← رجوع</a>
  </div>

  <!-- Header -->
  <div class="lb-header">
    <div class="lb-title">🏆 الليدربورد</div>
    <div class="lb-subtitle">
      <span class="live-dot"></span>
      <span id="liveLabel">بيتحدث كل 30 ثانية</span>
    </div>
  </div>

  <!-- Refresh progress bar -->
  <div class="refresh-bar">
    <div class="refresh-progress" id="refreshProgress" style="width:100%"></div>
  </div>
  <div class="last-updated" id="lastUpdated">جاري التحميل...</div>

  <!-- My Rank Pill (hidden until data loads) -->
  <div class="my-rank-pill" id="myRankPill" style="display:none">
    <span>ترتيبك</span>
    <span class="pill-rank" id="myRankNum">—</span>
    <span id="myRankOf">من —</span>
    <span>•</span>
    <span id="myRankPts">— نقطة</span>
  </div>

  <!-- Tabs -->
  <div class="lb-tabs">
    <button class="lb-tab active" id="tabMembers" onclick="switchTab('members')">👤 الأفراد</button>
    <button class="lb-tab"        id="tabTeams"   onclick="switchTab('teams')">🏅 الفرق</button>
  </div>

  <!-- Members Panel -->
  <div id="panelMembers">
    <div class="lb-list" id="membersList">
      <!-- skeleton -->
      <div class="skeleton skel-row"></div>
      <div class="skeleton skel-row"></div>
      <div class="skeleton skel-row"></div>
      <div class="skeleton skel-row"></div>
      <div class="skeleton skel-row"></div>
    </div>
  </div>

  <!-- Teams Panel -->
  <div id="panelTeams" style="display:none">
    <div id="teamsList">
      <div class="skeleton skel-row"></div>
      <div class="skeleton skel-row"></div>
      <div class="skeleton skel-row"></div>
    </div>
  </div>

</div><!-- /container -->

<script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
// ──────────────────────────────────────────
// Session
// ──────────────────────────────────────────
var member = getSession();
if(!member){ window.location.href = "index.html"; }

// ──────────────────────────────────────────
// State
// ──────────────────────────────────────────
var currentTab     = "members";
var allMembers     = [];
var allTeams       = [];
var REFRESH_SEC    = 30;
var _countdown     = REFRESH_SEC;
var _refreshTimer  = null;
var _progressTimer = null;

// ──────────────────────────────────────────
// Escape helper
// ──────────────────────────────────────────
function esc(s){
  return (s||"").toString().replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

// ──────────────────────────────────────────
// Tab switch
// ──────────────────────────────────────────
function switchTab(tab){
  currentTab = tab;
  document.getElementById("tabMembers").classList.toggle("active", tab==="members");
  document.getElementById("tabTeams").classList.toggle("active",   tab==="teams");
  document.getElementById("panelMembers").style.display = tab==="members" ? "" : "none";
  document.getElementById("panelTeams").style.display   = tab==="teams"   ? "" : "none";
}

// ──────────────────────────────────────────
// Fetch data
// ──────────────────────────────────────────
async function fetchAll(){
  // 1) أعضاء مع نقاطهم وفرقهم
  var membRes = await supabase
    .from("members")
    .select("id, name, team_name, points")
    .order("points", { ascending: false });

  if(!membRes.error && membRes.data){
    allMembers = membRes.data;
  }

  // 2) ترتيب الفرق — نجرب الـ RPC الموجودة أو نحسبها بنفسنا
  var teamRes = await supabase.rpc("get_team_points");
  if(!teamRes.error && teamRes.data && teamRes.data.length){
    allTeams = teamRes.data; // [{team_name, total_points}]
  } else {
    // fallback: نحسب من allMembers
    var teamMap = {};
    allMembers.forEach(function(m){
      if(!m.team_name) return;
      if(!teamMap[m.team_name]) teamMap[m.team_name] = 0;
      teamMap[m.team_name] += (m.points || 0);
    });
    allTeams = Object.keys(teamMap)
      .map(function(n){ return { team_name: n, total_points: teamMap[n] }; })
      .sort(function(a,b){ return b.total_points - a.total_points; });
  }
}

// ──────────────────────────────────────────
// Render members
// ──────────────────────────────────────────
function renderMembers(){
  var box = document.getElementById("membersList");
  if(!allMembers.length){
    box.innerHTML = '<div class="empty-lb">لسه مفيش بيانات 🙂</div>';
    return;
  }

  // ترتيب (بالفعل sorted من الـ query لكن نتأكد)
  var sorted = allMembers.slice().sort(function(a,b){ return (b.points||0)-(a.points||0); });

  // rank مع مراعاة التعادل
  var myRank = null, myPts = 0;
  var html = sorted.map(function(m, i){
    var rank = i + 1;
    // تعادل: نديه نفس رقم السابق لو نفس النقاط
    if(i > 0 && (m.points||0) === (sorted[i-1].points||0)){
      // استخرج rank من السابق — نعيد حسابها
      rank = getRank(sorted, i);
    }

    var isMe   = member && m.id === member.id;
    if(isMe){ myRank = rank; myPts = m.points||0; }

    var rowClass = "lb-row" +
      (isMe ? " is-me" : "") +
      (rank===1 ? " rank-1" : rank===2 ? " rank-2" : rank===3 ? " rank-3" : "");

    var rankBadge = rank<=3
      ? ["🥇","🥈","🥉"][rank-1]
      : rank;

    var rankNumClass = rank===1?"rank-num-1":rank===2?"rank-num-2":rank===3?"rank-num-3":"rank-num-n";

    var initial = (m.name||"؟").trim().charAt(0);

    return '<div class="'+rowClass+'">' +
      '<div class="lb-rank '+rankNumClass+'">'+rankBadge+'</div>' +
      '<div class="lb-avatar">'+esc(initial)+'</div>' +
      '<div class="lb-info">' +
        '<div class="lb-name">'+esc(m.name)+'</div>' +
        (m.team_name ? '<div class="lb-team-badge">'+esc(m.team_name)+'</div>' : '') +
      '</div>' +
      '<div class="lb-points">'+(m.points||0)+
        '<span class="lb-pts-label">نقطة</span>'+
      '</div>' +
    '</div>';
  }).join("");

  box.innerHTML = html;

  // My rank pill
  if(myRank !== null){
    document.getElementById("myRankPill").style.display = "flex";
    document.getElementById("myRankNum").textContent  = "#" + myRank;
    document.getElementById("myRankOf").textContent   = "من " + sorted.length;
    document.getElementById("myRankPts").textContent  = myPts + " نقطة";
  }
}

function getRank(sorted, idx){
  var pts = sorted[idx].points || 0;
  // أول شاب بنفس النقاط
  for(var j=0; j<idx; j++){
    if((sorted[j].points||0) === pts) return j+1;
  }
  return idx+1;
}

// ──────────────────────────────────────────
// Render teams
// ──────────────────────────────────────────
function renderTeams(){
  var box = document.getElementById("teamsList");
  if(!allTeams.length){
    box.innerHTML = '<div class="empty-lb">لسه مفيش فرق 🙂</div>';
    return;
  }

  var myTeam   = member ? (member.team_name || "") : "";
  var maxPts   = allTeams.reduce(function(max,t){ return Math.max(max, t.total_points||0); }, 1);
  var medals   = ["🥇","🥈","🥉"];

  // حساب عدد أعضاء كل فريق من allMembers
  var memberCount = {};
  allMembers.forEach(function(m){
    if(m.team_name){
      memberCount[m.team_name] = (memberCount[m.team_name]||0) + 1;
    }
  });

  box.innerHTML = allTeams.map(function(t, i){
    var rank    = i + 1;
    var isMyT   = myTeam && t.team_name === myTeam;
    var pct     = Math.round(((t.total_points||0) / maxPts) * 100);
    var count   = memberCount[t.team_name] || 0;

    return '<div class="team-card'+(isMyT?" is-my-team":"")+'">' +
      '<div class="team-rank-badge">'+(medals[i]||rank)+'</div>' +
      '<div class="team-name">'+(medals[i]?medals[i]+' ':rank+'. ')+esc(t.team_name)+'</div>' +
      '<div class="team-bar-track"><div class="team-bar-fill" style="width:'+pct+'%"></div></div>' +
      '<div class="team-meta">' +
        '<div>' +
          '<span class="team-points-big">'+(t.total_points||0)+'</span>' +
          '<span style="font-size:11px;color:var(--mist-dim);margin-right:4px">نقطة</span>' +
        '</div>' +
        '<div class="team-members-count">👥 '+count+' عضو</div>' +
      '</div>' +
    '</div>';
  }).join("");
}

// ──────────────────────────────────────────
// Last updated
// ──────────────────────────────────────────
function updateTimestamp(){
  var now = new Date();
  var h = now.getHours().toString().padStart(2,"0");
  var m = now.getMinutes().toString().padStart(2,"0");
  var s = now.getSeconds().toString().padStart(2,"0");
  document.getElementById("lastUpdated").textContent =
    "آخر تحديث " + h + ":" + m + ":" + s;
}

// ──────────────────────────────────────────
// Countdown progress bar
// ──────────────────────────────────────────
function startCountdown(){
  clearInterval(_progressTimer);
  _countdown = REFRESH_SEC;
  var bar = document.getElementById("refreshProgress");

  _progressTimer = setInterval(function(){
    _countdown -= 0.5;
    if(_countdown < 0) _countdown = 0;
    bar.style.width = ((_countdown / REFRESH_SEC) * 100) + "%";
    if(_countdown === 0){
      clearInterval(_progressTimer);
    }
  }, 500);
}

// ──────────────────────────────────────────
// Main load + auto-refresh
// ──────────────────────────────────────────
async function loadAndRender(){
  await fetchAll();
  renderMembers();
  renderTeams();
  updateTimestamp();
  startCountdown();
}

// أول تحميل
loadAndRender();

// تحديث كل 30 ثانية
_refreshTimer = setInterval(loadAndRender, REFRESH_SEC * 1000);

// تنظيف لو الصفحة اتركت
window.addEventListener("beforeunload", function(){
  clearInterval(_refreshTimer);
  clearInterval(_progressTimer);
});
</script>
<script src="js/realtime.js"></script>
</body>
</html>
