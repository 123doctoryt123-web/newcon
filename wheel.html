<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عجلة الجوائز 🎡 | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<style>
#loadingState{
  display:flex; flex-direction:column; align-items:center;
  gap:12px; padding:48px 0; color:var(--mist-dim); font-size:14px;
}
.spinner{
  width:32px; height:32px; border:3px solid var(--line);
  border-top-color:var(--gold); border-radius:50%;
  animation: spin .7s linear infinite;
}
@keyframes spin{ to{ transform:rotate(360deg); } }

/* ── منطقة العجلة ── */
.wheel-wrap{
  position:relative;
  width: min(320px, 82vw);
  aspect-ratio: 1/1;
  margin: 10px auto 24px;
}
.wheel-pointer{
  position:absolute; top:-6px; left:50%; transform:translateX(-50%);
  width:0; height:0; z-index:3;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:24px solid var(--gold);
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
}
.wheel-disc{
  width:100%; height:100%; border-radius:50%;
  position:relative;
  border: 6px solid var(--ink-3);
  box-shadow: 0 0 0 2px var(--gold), var(--shadow-glow), 0 10px 40px rgba(0,0,0,0.5);
  background: conic-gradient(
    from 0deg,
    var(--gold)      0deg   72deg,
    var(--coral)      72deg  144deg,
    var(--pitch)      144deg 216deg,
    var(--gold-dim)   216deg 288deg,
    var(--pitch-dim)  288deg 360deg
  );
  transition: transform 4.2s cubic-bezier(.17,.67,.2,1);
}
.wheel-center{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:54px; height:54px; border-radius:50%;
  background: radial-gradient(circle, var(--ink-2), var(--ink));
  border:2px solid var(--gold);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; z-index:2;
  box-shadow: 0 0 16px rgba(200,150,90,0.4);
}
.wheel-label{
  position:absolute; top:50%; left:50%;
  width:150px; height:0;
  transform-origin: 0 0;
  display:flex; align-items:center;
  font-size:11px; font-weight:800; color:#fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  pointer-events:none;
}
.wheel-label span{ margin-right:14px; white-space:nowrap; }

.spin-btn{
  width:100%; padding:16px;
  border-radius: var(--radius);
  border: none; cursor: pointer;
  font-family: var(--font-display);
  font-size: 18px; font-weight:800;
  letter-spacing:.3px;
  background: linear-gradient(135deg, var(--gold), var(--coral));
  color: #fff;
  box-shadow: 0 4px 24px rgba(200,150,90,0.35);
  transition: transform .15s, box-shadow .15s;
}
.spin-btn:active{ transform:scale(0.97); }
.spin-btn:disabled{
  background: var(--ink-3); color: var(--mist-dim);
  box-shadow:none; cursor:default;
}

.result-banner{
  background: linear-gradient(135deg, rgba(200,150,90,0.2), rgba(200,150,90,0.06));
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  padding: 26px 18px;
  text-align:center;
  margin-bottom:16px;
}
.result-banner .result-icon{ font-size:52px; margin-bottom:10px; display:block; }
.result-banner h2{
  font-family: var(--font-display);
  font-size:22px; color: var(--gold);
  margin-bottom:6px;
}
.result-banner p{ font-size:13px; color:var(--mist-dim); }
.result-banner .pts-pill{
  display:inline-block; margin-top:12px;
  background: rgba(200,150,90,0.15); border:1px solid var(--gold);
  border-radius:99px; padding:6px 16px;
  font-family:var(--font-display); font-weight:800; color:var(--gold); font-size:14px;
}

.not-active{
  text-align:center; padding:40px 0;
  color:var(--mist-dim); font-size:14px;
}
.not-active .big-icon{ font-size:52px; margin-bottom:12px; display:block; }
.err-msg{ color:var(--coral); font-size:13px; text-align:center; margin-top:10px; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <a href="dashboard.html" class="brand"><span class="dot"></span> Connect Three</a>
    <a href="dashboard.html" class="logout-link">رجوع</a>
  </div>

  <h1 class="display" style="font-size:20px;margin-bottom:4px">🎡 عجلة الجوائز</h1>
  <p style="font-size:13px;color:var(--mist-dim);margin-bottom:22px">لفة واحدة بس طول المؤتمر، جرب حظك!</p>

  <div id="loadingState">
    <div class="spinner"></div>
    <span>جاري التحميل…</span>
  </div>

  <!-- العجلة متقفلة من الأدمن -->
  <div id="inactiveState" style="display:none">
    <div class="not-active">
      <span class="big-icon">🔒</span>
      <h2 style="font-family:var(--font-display);font-size:18px;color:var(--mist);margin-bottom:8px">العجلة لسه مقفولة</h2>
      <p>استنى الأدمن يفتح العجلة</p>
    </div>
  </div>

  <!-- شاشة اللف -->
  <div id="wheelState" style="display:none">
    <div class="wheel-wrap">
      <div class="wheel-pointer"></div>
      <div class="wheel-disc" id="wheelDisc">
        <div class="wheel-center">🎁</div>
      </div>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="doSpin()">🎡 لف العجلة</button>
    <div class="err-msg" id="errMsg"></div>
  </div>

  <!-- نتيجة اللفة -->
  <div id="resultState" style="display:none">
    <div class="wheel-wrap" style="margin-bottom:10px">
      <div class="wheel-pointer"></div>
      <div class="wheel-disc" id="wheelDiscDone">
        <div class="wheel-center">🎁</div>
      </div>
    </div>
    <div class="result-banner">
      <span class="result-icon" id="resultIcon">🎉</span>
      <h2 id="resultLabel">جائزتك</h2>
      <p>مبروك! دي جايزتك من عجلة الجوائز</p>
      <div class="pts-pill" id="resultPts" style="display:none"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
var memberId = null;

// ترتيب الجوائز على العجلة لازم يطابق ترتيبها في spin_wheel بالسيرفر
var PRIZE_ORDER = ['free_tea','surprise','points5','points10','better_luck'];
var PRIZE_LABELS_POS = [
  { text:'☕ شاي مجاني',            deg:36  },
  { text:'🎁 مفاجأة',               deg:108 },
  { text:'✨ 5 بوينتس',             deg:180 },
  { text:'🌟 10 بوينتس',            deg:252 },
  { text:'🍀 حظ أوفر المرة الجاية', deg:324 }
];
var PRIZE_ICONS = {
  free_tea:'☕', surprise:'🎁', points5:'✨', points10:'🌟', better_luck:'🍀'
};

window.addEventListener('DOMContentLoaded', function(){
  try{
    var raw = localStorage.getItem('member');
    if(!raw){ location.href='index.html'; return; }
    var member = JSON.parse(raw);
    memberId = member.id;
    if(!memberId){ location.href='index.html'; return; }
    drawLabels('wheelDisc');
    drawLabels('wheelDiscDone');
    loadStatus();
  }catch(e){
    document.getElementById('loadingState').innerHTML =
      '<div style="color:var(--coral);text-align:center;padding:20px;font-size:13px">حصل خطأ: ' +
      (e && e.message ? e.message : e) +
      '<br><a href="index.html" style="color:var(--gold)">ارجع لصفحة الدخول</a></div>';
  }
});

function drawLabels(discId){
  var disc = document.getElementById(discId);
  PRIZE_LABELS_POS.forEach(function(p){
    var lbl = document.createElement('div');
    lbl.className = 'wheel-label';
    lbl.style.transform = 'rotate(' + p.deg + 'deg)';
    lbl.innerHTML = '<span>' + p.text + '</span>';
    disc.appendChild(lbl);
  });
}

async function loadStatus(){
  show('loadingState');
  try{
    var res = await supabase.rpc('get_my_wheel', { p_member_id: memberId });
    if(res.error || !res.data || !res.data.length){ show('inactiveState'); return; }
    var s = res.data[0];
    if(s.spun){
      renderResult(s.prize_key, s.prize_label, s.points_won);
      show('resultState');
      return;
    }
    if(!s.active){ show('inactiveState'); return; }
    show('wheelState');
  }catch(e){
    show('inactiveState');
  }
}

async function doSpin(){
  var btn = document.getElementById('spinBtn');
  var err = document.getElementById('errMsg');
  btn.disabled = true;
  btn.textContent = '⏳ بنلف...';
  err.textContent = '';

  try{
    var res = await supabase.rpc('spin_wheel', { p_member_id: memberId });
    if(res.error) throw res.error;
    var r = res.data && res.data[0];
    if(!r || r.status === 'not_found'){
      err.textContent = 'حصل خطأ، حاول تاني';
      btn.disabled = false; btn.textContent = '🎡 لف العجلة';
      return;
    }
    if(r.status === 'inactive'){
      show('inactiveState'); return;
    }
    if(r.status === 'already_spun' || r.status === 'ok'){
      spinAnimation(r.prize_key, function(){
        renderResult(r.prize_key, r.prize_label, r.points_won);
        show('resultState');
      });
    }
  }catch(e){
    err.textContent = 'حصل خطأ في الاتصال، حاول تاني';
    btn.disabled = false; btn.textContent = '🎡 لف العجلة';
  }
}

function spinAnimation(prizeKey, done){
  var disc = document.getElementById('wheelDisc');
  var idx = PRIZE_ORDER.indexOf(prizeKey);
  if(idx < 0) idx = 0;
  var segCenter = idx * 72 + 36;
  var extraSpins = 6 * 360;
  var target = extraSpins + ((360 - segCenter) % 360);
  disc.style.transform = 'rotate(' + target + 'deg)';
  setTimeout(done, 4300);
}

function renderResult(prizeKey, prizeLabel, pointsWon){
  document.getElementById('resultIcon').textContent = PRIZE_ICONS[prizeKey] || '🎉';
  document.getElementById('resultLabel').textContent = prizeLabel;
  var pts = document.getElementById('resultPts');
  if(pointsWon > 0){
    pts.style.display = 'inline-block';
    pts.textContent = '+' + pointsWon + ' نقطة اتضافت لحسابك';
  } else {
    pts.style.display = 'none';
  }
  // ثبّت عجلة النتيجة على الجايزة اللي فازت بيها من غير أنميشن
  var idx = PRIZE_ORDER.indexOf(prizeKey);
  if(idx < 0) idx = 0;
  var segCenter = idx * 72 + 36;
  var discDone = document.getElementById('wheelDiscDone');
  discDone.style.transition = 'none';
  discDone.style.transform = 'rotate(' + ((360 - segCenter) % 360) + 'deg)';
}

function show(id){
  ['loadingState','inactiveState','wheelState','resultState']
    .forEach(function(s){ document.getElementById(s).style.display = s===id ? '' : 'none'; });
}
</script>
</body>
</html>
