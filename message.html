<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رسالة ليك | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<style>
.msg-top-stats{
  display:flex; align-items:center; justify-content:space-between;
  background: linear-gradient(160deg, var(--ink-2), var(--ink-3));
  border:1px solid var(--line); border-radius: var(--radius-sm);
  padding:12px 16px; margin-bottom:16px; font-size:13px; color:var(--mist-dim);
}
.msg-top-stats b{ color:var(--gold); font-family:var(--font-display); }

.msg-tabs{ display:flex; gap:8px; margin-bottom:18px; }
.msg-tab{
  flex:1; text-align:center; padding:9px 0; border-radius:99px;
  border:1px solid var(--line); cursor:pointer; color:var(--mist-dim);
  font-size:13px; font-weight:600; transition: all .15s;
}
.msg-tab.active{ background: linear-gradient(135deg, var(--coral), #a03020); color:#fff; border-color:var(--coral); }

/* ---- البطاقة الرئيسية ---- */
.verse-shell{
  display:flex; border-radius: var(--radius); overflow:hidden;
  border:1px solid var(--line); box-shadow: var(--shadow-glow);
  min-height: 260px; margin-bottom:16px;
  background: linear-gradient(160deg, var(--ink-2), var(--ink-3));
}

.verse-rail{
  width:58px; flex-shrink:0;
  background: linear-gradient(180deg, var(--gold), var(--coral));
  display:flex; flex-direction:column; align-items:center; justify-content:space-between;
  padding:18px 0; position:relative;
}
.verse-rail .rail-icon{ font-size:20px; opacity:.9; }
.verse-rail .rail-dots{ display:flex; flex-direction:column; gap:6px; }
.verse-rail .rail-dots span{ width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.55); display:block; }
.verse-num-badge{
  font-family:var(--font-display); font-weight:800; font-size:13px;
  background: rgba(13,27,42,0.55); color:#fff;
  width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  border:1px solid rgba(255,255,255,0.4);
}

.verse-main{
  flex:1; padding: 30px 22px 22px; position:relative; overflow:hidden;
  display:flex; flex-direction:column; justify-content:center;
}
.quote-mark{
  position:absolute; top:-18px; left:6px;
  font-family: Georgia, serif; font-size:110px; font-weight:900;
  color: rgba(200,150,90,0.08); line-height:1; pointer-events:none; user-select:none;
}
.verse-body{ position:relative; z-index:1; }
.verse-text{
  font-family:var(--font-display); font-weight:700; font-size:19px; line-height:1.85;
  color: var(--mist); margin-bottom:14px;
  animation: verseIn .35s ease;
}
@keyframes verseIn{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }
.verse-ref-row{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.verse-ref-pill{
  display:inline-flex; align-items:center; gap:6px;
  font-size:12px; color:var(--gold); background: rgba(200,150,90,0.12);
  padding:6px 12px; border-radius:99px; border:1px solid var(--line);
}
.star-btn{
  width:34px; height:34px; border-radius:50%; border:1px solid var(--line);
  background: rgba(6,15,24,0.4); color:var(--mist-dim); font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition: all .15s;
}
.star-btn.active{ color:var(--gold); border-color:var(--gold); background: rgba(200,150,90,0.15); }

/* ---- شريط الأكشن تحت الكارت ---- */
.action-row{ display:flex; gap:10px; margin-bottom:18px; }
.action-row .btn{ flex:1; }
.action-row .btn.icon-only{ flex:0 0 50px; padding:14px 0; }

/* ---- زخرفة فاصل ---- */
.divider-deco{
  display:flex; align-items:center; gap:10px; margin: 22px 0 16px; color:var(--mist-dim);
}
.divider-deco::before, .divider-deco::after{ content:""; flex:1; height:1px; background:var(--line); }
.divider-deco span{ font-size:11px; letter-spacing:1px; }

/* ---- المفضلة ---- */
.fav-empty{ text-align:center; padding:30px 10px; color:var(--mist-dim); font-size:13px; }
.fav-item{
  display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
  border-bottom:1px solid var(--line); padding:14px 4px;
}
.fav-item:last-child{ border-bottom:none; }
.fav-item .fav-text{ font-size:14px; line-height:1.7; color:var(--mist); margin-bottom:4px; }
.fav-item .fav-ref{ font-size:11px; color:var(--mist-dim); }
.fav-remove{
  background:none; border:none; color:var(--mist-dim); cursor:pointer; font-size:16px;
  flex-shrink:0; padding:4px;
}
.fav-remove:hover{ color:var(--coral); }

.toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px);
  background: var(--ink-2); border:1px solid var(--gold); color:var(--mist);
  padding:10px 20px; border-radius:99px; font-size:13px;
  opacity:0; transition: all .25s; z-index:50; white-space:nowrap;
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <a href="dashboard.html" class="brand">
      <img src="logo.png" style="width:28px;height:28px;object-fit:contain;">
      Connect Three
    </a>
    <a href="#" class="logout-link" id="logoutBtn">خروج</a>
  </div>

  <h1 class="display" style="font-size:20px;margin-bottom:6px">💌 رسالة ليك</h1>
  <p style="color:var(--mist-dim);font-size:13px;margin-bottom:16px">آية تشجيع جديدة كل ما تفتح الصفحة</p>

  <div class="msg-top-stats">
    <span>📖 قريت <b id="readCount">0</b> آية النهاردة</span>
    <span>⭐ <b id="favCount">0</b> فى المفضلة</span>
  </div>

  <div class="msg-tabs">
    <div class="msg-tab active" data-view="verse" id="tabVerse">آية اليوم</div>
    <div class="msg-tab" data-view="fav" id="tabFav">المفضلة ⭐</div>
  </div>

  <!-- شاشة الآية -->
  <div id="verseView">
    <div class="verse-shell">
      <div class="verse-rail">
        <div class="rail-icon">✝️</div>
        <div class="rail-dots"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="verse-num-badge" id="verseNumBadge">1</div>
      </div>
      <div class="verse-main">
        <div class="quote-mark">”</div>
        <div class="verse-body">
          <div class="verse-text" id="verseText"></div>
          <div class="verse-ref-row">
            <div class="verse-ref-pill">📍 <span id="verseRef"></span></div>
            <button class="star-btn" id="starBtn" title="حفظ فى المفضلة">☆</button>
          </div>
        </div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn" id="anotherBtn">آية تانية 🔄</button>
      <button class="btn outline icon-only" id="copyBtn" title="نسخ الآية">📋</button>
      <button class="btn outline icon-only" id="shareBtn" title="مشاركة">📤</button>
    </div>

    <div class="divider-deco"><span>WAY · TRUTH · LIFE</span></div>
  </div>

  <!-- شاشة المفضلة -->
  <div id="favView" style="display:none">
    <div class="card">
      <div id="favList"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
<script src="js/supabaseclient.js"></script>
<script src="js/auth.js"></script>
<script>
var member = requireSession();
document.getElementById("logoutBtn").addEventListener("click", logout);

var verses = [
  { text: "لاَ تَخَفْ لأَنِّي مَعَكَ، وَأُبَارِكُكَ", ref: "سفر التكوين 26: 24" },
  { text: "انْتَظِرِ الرَّبَّ. لِيَتَشَدَّدْ وَلْيَتَشَجَّعْ قَلْبُكَ، وَانْتَظِرِ الرَّبَّ", ref: "سفر المزامير 27: 14" },
  { text: "تَشَدَّدُوا وَتَشَجَّعُوا. لاَ تَخَافُوا وَلاَ تَرْهَبُوا وُجُوهَهُمْ، لأَنَّ الرَّبَّ إِلهَكَ سَائِرٌ مَعَكَ. لاَ يُهْمِلُكَ وَلاَ يَتْرُكُكَ", ref: "سفر التثنية 31: 6" },
  { text: "تَشَدَّدْ وَتَشَجَّعْ", ref: "سفر التثنية 31: 7؛ 31: 23؛ سفر يشوع 1: 6" },
  { text: "كُنْ مُتَشَدِّدًا، وَتَشَجَّعْ جِدًّا لِكَيْ تَتَحَفَّظَ لِلْعَمَلِ حَسَبَ كُلِّ الشَّرِيعَةِ. لاَ تَمِلْ عَنْهَا يَمِينًا وَلاَ شِمَالًا لِكَيْ تُفْلِحَ حَيْثُمَا تَذْهَبُ", ref: "سفر يشوع 1: 7" },
  { text: "تَشَدَّدْ وَتَشَجَّعْ! لاَ تَرْهَبْ وَلاَ تَرْتَعِبْ لأَنَّ الرَّبَّ إِلهَكَ مَعَكَ حَيْثُمَا تَذْهَبُ", ref: "سفر يشوع 1: 9" },
  { text: "كُنْ مُتَشَدِّدًا وَتَشَجَّعْ", ref: "سفر يشوع 1: 18" },
  { text: "لاَ تَخَافُوا وَلاَ تَرْتَعِبُوا. تَشَدَّدُوا وَتَشَجَّعُوا", ref: "سفر يشوع 10: 25" },
  { text: "تَشَدَّدْ وَتَشَجَّعْ لاَ تَخَفْ وَلاَ تَرْتَعِبْ", ref: "سفر أخبار الأيام الأول 22: 13" },
  { text: "تَشَدَّدْ وَتَشَجَّعْ وَاعْمَلْ. لاَ تَخَفْ وَلاَ تَرْتَعِبْ، لأَنَّ الرَّبَّ الإِلهَ إِلهِي مَعَكَ. لاَ يَخْذُلُكَ وَلاَ يَتْرُكُكَ حَتَّى تُكَمِّلَ كُلَّ عَمَلِ خِدْمَةِ بَيْتِ الرَّبِّ", ref: "سفر أخبار الأيام الأول 28: 20" },
  { text: "تَشَدَّدُوا وَتَشَجَّعُوا. لاَ تَخَافُوا وَلاَ تَرْتَاعُوا مِنْ مَلِكِ أَشُّورَ وَمِنْ كُلِّ الْجُمْهُورِ الَّذِي مَعَهُ، لأَنَّ مَعَنَا أَكْثَرَ مِمَّا مَعَهُ", ref: "سفر أخبار الأيام الثاني 32: 7" },
  { text: "لِتَتَشَدَّدْ وَلْتَتَشَجَّعْ قُلُوبُكُمْ، يَا جَمِيعَ الْمُنْتَظِرِينَ الرَّبَّ", ref: "سفر المزامير 31: 24" },
  { text: "تَقَلَّدْ سَيْفَكَ عَلَى فَخْذِكَ أَيُّهَا الْجَبَّارُ، جَلاَلَكَ وَبَهَاءَكَ", ref: "سفر المزامير 45: 2" },
  { text: "عَلَى الأَسَدِ وَالصِّلِّ تَطَأُ. الشِّبْلَ وَالثُّعْبَانَ تَدُوسُ", ref: "سفر المزامير 91: 13" },
  { text: "شَجِّعُوا صِغَارَ النُّفُوسِ. أَسْنِدُوا الضُّعَفَاءَ. تَأَنَّوْا عَلَى الْجَمِيعِ", ref: "رسالة بولس الرسول الأولى إلى أهل تسالونيكي 5: 14" },
  { text: "تَشَجَّعُوا! أَنَا هُوَ. لاَ تَخَافُوا", ref: "إنجيل متى 14: 27" },
  { text: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ. قَدْ أَيَّدْتُكَ وَأَعَنْتُكَ وَعَضَدْتُكَ بِيَمِينِ بِرِّي", ref: "سفر إشعياء 41: 10" },
  { text: "لاَ تَخَفْ مِنْ وُجُوهِهِمْ، لأَنِّي أَنَا مَعَكَ لأُنْقِذَكَ، يَقُولُ الرَّبُّ", ref: "سفر إرميا 1: 8" },
  { text: "لاَ تَخَافُوا مَلِكَ بَابِلَ الَّذِي أَنْتُمْ خَائِفُوهُ. لاَ تَخَافُوهُ، يَقُولُ الرَّبُّ، لأَنِّي أَنَا مَعَكُمْ لأُخَلِّصَكُمْ وَأُنْقِذَكُمْ مِنْ يَدِهِ", ref: "سفر إرميا 42: 11" }
];

var STORAGE_KEY = "ct_favoriteVerses";
var COUNT_KEY = "ct_readCount_" + new Date().toDateString();
var lastIndex = -1;
var currentVerse = null;

function escapeHtmlSimple(s){
  return (s || "").replace(/[&<>"']/g, function(c){
    return { "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c];
  });
}

function getFavorites(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e){ return []; }
}
function saveFavorites(list){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  document.getElementById("favCount").textContent = list.length;
}
function isFavorite(ref){
  return getFavorites().some(function(v){ return v.ref === ref; });
}

function bumpReadCount(){
  var n = parseInt(localStorage.getItem(COUNT_KEY) || "0") + 1;
  localStorage.setItem(COUNT_KEY, n);
  document.getElementById("readCount").textContent = n;
}

function showToast(text){
  var t = document.getElementById("toast");
  t.textContent = text;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 1800);
}

function updateStarBtn(){
  var btn = document.getElementById("starBtn");
  var fav = isFavorite(currentVerse.ref);
  btn.textContent = fav ? "★" : "☆";
  btn.classList.toggle("active", fav);
}

function showVerse(i){
  currentVerse = verses[i];
  document.getElementById("verseText").textContent = '"' + currentVerse.text + '"';
  document.getElementById("verseRef").textContent = currentVerse.ref;
  document.getElementById("verseNumBadge").textContent = (i + 1);
  var vt = document.getElementById("verseText");
  vt.style.animation = "none";
  requestAnimationFrame(function(){ vt.style.animation = "verseIn .35s ease"; });
  updateStarBtn();
}

function showRandomVerse(bump){
  var i;
  do { i = Math.floor(Math.random() * verses.length); } while(i === lastIndex && verses.length > 1);
  lastIndex = i;
  showVerse(i);
  if(bump) bumpReadCount();
}

document.getElementById("anotherBtn").addEventListener("click", function(){ showRandomVerse(true); });

document.getElementById("starBtn").addEventListener("click", function(){
  var list = getFavorites();
  if(isFavorite(currentVerse.ref)){
    list = list.filter(function(v){ return v.ref !== currentVerse.ref; });
    showToast("تم الحذف من المفضلة");
  } else {
    list.push(currentVerse);
    showToast("تمت الإضافة للمفضلة ⭐");
  }
  saveFavorites(list);
  updateStarBtn();
  renderFavorites();
});

document.getElementById("copyBtn").addEventListener("click", function(){
  var text = '"' + currentVerse.text + '" — ' + currentVerse.ref;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){ showToast("تم نسخ الآية 📋"); });
  }
});

document.getElementById("shareBtn").addEventListener("click", function(){
  var text = '"' + currentVerse.text + '" — ' + currentVerse.ref;
  if(navigator.share){
    navigator.share({ text: text }).catch(function(){});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){ showToast("تم نسخ الآية، تقدر تلصقها فين عايز 📤"); });
  }
});

function renderFavorites(){
  var list = getFavorites();
  document.getElementById("favCount").textContent = list.length;
  var box = document.getElementById("favList");
  if(list.length === 0){
    box.innerHTML = '<div class="fav-empty"><div style="font-size:36px;margin-bottom:8px">⭐</div>دوس على النجمة جنب أي آية عشان تحفظها هنا</div>';
    return;
  }
  box.innerHTML = list.map(function(v, idx){
    return '<div class="fav-item"><div><div class="fav-text">"' + escapeHtmlSimple(v.text) + '"</div><div class="fav-ref">📍 ' + escapeHtmlSimple(v.ref) + '</div></div><button class="fav-remove" data-idx="' + idx + '">✕</button></div>';
  }).join("");
  box.querySelectorAll(".fav-remove").forEach(function(btn){
    btn.addEventListener("click", function(){
      var idx = parseInt(btn.dataset.idx);
      var l = getFavorites();
      l.splice(idx, 1);
      saveFavorites(l);
      renderFavorites();
      updateStarBtn();
    });
  });
}

function switchView(view){
  document.getElementById("tabVerse").classList.toggle("active", view === "verse");
  document.getElementById("tabFav").classList.toggle("active", view === "fav");
  document.getElementById("verseView").style.display = view === "verse" ? "block" : "none";
  document.getElementById("favView").style.display = view === "fav" ? "block" : "none";
  if(view === "fav") renderFavorites();
}
document.getElementById("tabVerse").addEventListener("click", function(){ switchView("verse"); });
document.getElementById("tabFav").addEventListener("click", function(){ switchView("fav"); });

// init
document.getElementById("readCount").textContent = localStorage.getItem(COUNT_KEY) || "0";
document.getElementById("favCount").textContent = getFavorites().length;
showRandomVerse(true);
</script>
</body>
</html>
