<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير المتابعة | Connect Three</title>
<link rel="stylesheet" href="css/style.css">
<style>
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);margin-bottom:18px;}
.brand{font-family:var(--font-display);font-weight:800;color:var(--mist);display:flex;align-items:center;gap:8px;}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--pitch);display:inline-block;}
.logout-link{color:var(--mist-dim);font-size:13px;text-decoration:none;cursor:pointer;}

#viewerLoginScreen{max-width:340px;margin:80px auto;padding:24px;background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);text-align:center;}
#viewerLoginScreen h2{font-family:var(--font-display);color:var(--mist);margin-bottom:6px;}
#viewerLoginScreen p{color:var(--mist-dim);font-size:12px;margin-bottom:18px;}
#viewerLoginScreen input{width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--ink);color:var(--mist);margin-bottom:12px;font-size:14px;box-sizing:border-box;}
#viewerLoginScreen button{width:100%;padding:12px;border-radius:var(--radius-sm);border:none;background:var(--pitch);color:#fff;font-weight:700;cursor:pointer;font-family:var(--font-body);}
#viewerErrorMsg{display:none;color:var(--coral);font-size:12px;margin-top:8px;}

#viewerPanel{display:none;padding:0 16px 40px;}
.stats-row{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:130px;background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;}
.stat-card .num{font-family:var(--font-display);font-weight:800;font-size:24px;color:var(--gold);}
.stat-card .lbl{font-size:12px;color:var(--mist-dim);margin-top:2px;}

.tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tab{padding:8px 16px;border-radius:99px;background:var(--ink-2);border:1px solid var(--line);color:var(--mist-dim);font-size:13px;cursor:pointer;font-weight:600;}
.tab.active{background:var(--pitch);color:#fff;border-color:var(--pitch);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.search-input{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--line);background:var(--ink-2);color:var(--mist);margin-bottom:12px;font-size:13px;box-sizing:border-box;}

table{width:100%;border-collapse:collapse;background:var(--ink-2);border-radius:var(--radius);overflow:hidden;}
th{background:var(--ink-3);color:var(--mist-dim);font-size:12px;padding:10px;text-align:right;}
td{padding:10px;border-top:1px solid var(--line);color:var(--mist);font-size:13px;}
.pill{font-size:11px;background:rgba(200,150,90,.12);padding:3px 10px;border-radius:99px;color:var(--gold-dim);}

.team-row{display:flex;align-items:center;gap:12px;background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:8px;}
.team-rank{font-family:var(--font-display);font-weight:800;color:var(--gold);width:32px;}
.team-name{flex:1;font-weight:700;color:var(--mist);}
.team-points{font-family:var(--font-display);font-weight:800;color:var(--pitch);}

.refresh-btn{background:var(--ink-2);border:1px solid var(--line);color:var(--mist);padding:6px 14px;border-radius:99px;font-size:12px;cursor:pointer;}
.table-wrap{max-height:70vh;overflow:auto;border-radius:var(--radius);}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span> تقرير المتابعة</div>
  <span class="logout-link" id="viewerLogoutBtn">خروج</span>
</div>

<div id="viewerLoginScreen">
  <h2>تقرير المتابعة</h2>
  <p>صفحة عرض فقط — للدرجات والحضور والغياب، بدون أي صلاحية تعديل</p>
  <input type="password" id="viewerPassInput" placeholder="كلمة السر">
  <button id="viewerLoginBtn">دخول</button>
  <div id="viewerErrorMsg"></div>
</div>

<div id="viewerPanel">

  <div class="stats-row">
    <div class="stat-card"><div class="num" id="memberCount">-</div><div class="lbl">عدد الشباب</div></div>
    <div class="stat-card"><div class="num" id="attendanceCount">-</div><div class="lbl">تسجيلات الحضور</div></div>
    <div class="stat-card" style="flex:0 0 auto"><button class="refresh-btn" id="refreshBtn">🔄 تحديث</button></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="members">👤 الشباب والنقاط</div>
    <div class="tab" data-tab="teams">🏆 الفرق</div>
    <div class="tab" data-tab="attendance">✅ الحضور والغياب</div>
  </div>

  <div class="tab-panel active" id="panel-members">
    <input class="search-input" id="memberSearch" placeholder="دور على اسم أو فريق...">
    <div class="table-wrap">
      <table id="membersTable">
        <thead><tr><th>الاسم</th><th>الفريق</th><th>الدور</th><th>النقاط</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="tab-panel" id="panel-teams">
    <div id="teamPointsWrap"></div>
  </div>

  <div class="tab-panel" id="panel-attendance">
    <input class="search-input" id="attendanceSearch" placeholder="دور على اسم...">
    <div class="table-wrap">
      <table id="attendanceTable">
        <thead><tr><th>الاسم</th><th>النوع</th><th>الوقت</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

</div>

<script src="js/supabaseclient.js"></script>
<script src="js/report.js"></script>
</body>
</html>
